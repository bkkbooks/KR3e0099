body:
  text: 傷寒類方卷下吳江徐大椿撰承氣湯類六大承氣湯一大黃四兩酒洗厚朴半斤炙去皮枳實五枚炙芒硝三合右四味以水一斗先煮厚朴枳實取五升去滓內大黃煮取二升去滓內硝更上微火一兩沸分溫再服得下餘勿服傷寒若吐若下後不解壞症不大便五六日上至十餘日日晡時發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸牀惕而不安微喘直視以上皆陽明危症因吐下之後竭其中氣津液已耗孤陽獨存胃中乾燥或有燥屎故現此等惡症脈弦者生澀者死弦則隂氣尚存且能尅制胃實澀則氣血已枮矣然弦者尚有可生之理未必盡生澀則斷無不死者也微者但發熱潮熱讝語者惡症皆無大承氣湯主之若一服利止後服中病即止陽明病讝語有潮熱反不能食者客熱不能消穀胃中必有燥屎五六枚若能食者但鞭爾能食非真欲食不過粥飲猶可入口耳不能食則穀氣全不可近腸胃實極故也宜大承氣湯下之鞭即可下今按燥屎當在腸中云胃中何也蓋邪氣結成糟粕未下則在胃中欲下則在腸中已結者即謂之燥屎言胃則腸已該矣汗出讝語者以有燥屎在胃中此為風也陽明本自汗出然亦有不汗出者此指明汗出之為風則知汗出乃表邪尚在不汗出者為火邪內結也須下之過經乃可下之此下之之時下之若早語言必亂輕於讝語以表虛裡實故也下早則引表邪入裡故表虛而裡實下之則愈宜大承氣湯雖已誤下然見讝語等症則更下之亦不因誤下而遂不復下也二陽併病同起者為合病一經未罷一經又病者為併病太陽症罷但發潮熱手足漐漐汗出大便難而讝語者以上皆陽明現症下之則愈宜大承氣湯陽明病下之心中懊憹而煩此乃下之未盡故有此實煩胃中有燥屎者可攻胃中燥屎必别有現症腹微滿初頭鞭後必溏不可下也僅微滿則無燥屎故不可攻若有燥屎者宜大承氣湯病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈虛浮者宜發汗下之與大承氣湯發汗宜桂枝湯詳解前桂枝湯下大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也惟有宿食故雖大下而燥屎終未盡宜大承氣湯病人不大便五六日繞臍痛正在燥屎之位煩燥發作有時者此有燥屎故令不大便也病人小便不利大便乍難乍易時有微熱喘冒不能卧者有燥屎也喘冒不卧燥屎現症宜大便有難無易所以乍易者以小便不利之故燥屎不以易便而去也宜大承氣湯以上三條皆證明有燥屎之法得病二三日脈弱無太陽柴胡症煩燥心下鞭邪熱入裡至四五日又隔二日雖能食以小承氣湯少少與微和之不必用全方祇通其胃氣而已又用藥之一法令小安至六日又隔一日而病未除與大承氣湯一升亦不必用全方古人用藥雖現症鑿鑿而輕方小試敬慎小心如此若不大便六七日小便少者雖不能食但初頭鞭後必溏未定成鞭小便不利則水穀未盡分大便猶濕也攻之必溏須小便利屎定鞭乃可攻之以小便之利否定宜下不宜下又一法宜大承氣湯傷寒六七日目中不了了睛不和皆陽盛之象無表裏症邪已結在裏大便難身微熱者此為實也邪結為實急下之宜大承氣湯陽明病此三字包陽明諸症發熱汗多者急下之此重在汗多恐內熱甚而逼陽於外以致亡陽也宜大承氣湯發汗不解腹滿痛者不解二字必兼有陽明症加以腹滿且痛則實邪有徴矣急下之宜大承氣湯腹滿不减减不足言雖略减而仍腹滿也當下之宜大承氣湯以上諸條舉當下之一二症即用下法然亦必須參觀他症而後定為妥陽明少陽合病必下痢其脈不負者順也負者失也少陽屬木脈當弦緊陽明屬土脈當洪緩若少陽脈勝為負陽明脈勝為不負也厥隂篇云少隂負趺陽者為順也少隂屬水趺陽屬土土能勝水則胃氣尚強故為順即此意但彼處乃手足厥冷之利故屬少隂此則屬少陽為異耳互相尅賊名為負也脈滑而數者有宿食也滑數則陽明之脈獨見而過盛此為實邪故知有宿食當下之宜此湯寸口脈浮而大按之反澀尺中亦微而澀有食而反微澀此氣結不通之故故知有宿食當下之宜大承氣湯少隂病得之二三日陽邪初轉入隂口燥舌乾者急下之陽邪傳隂腎水欲涸故當急去其邪以保津液宜大承氣湯少隂病自利清水色純青純青則非寒邪乃肝邪入腎也難經云從前來者為實邪心下必痛口乾燥者二症尤見非寒邪急下之宜大承氣湯二條俱重口乾知為熱邪無疑少隂病六七日腹脹不大便者急下之不便而脹為日又久是以當下宜大承氣湯下利三部脈皆平無外邪症按之心下鞭者實邪有形急下之宜大承氣湯下利脈遲而滑者內實也利未欲止當下之宜大承氣湯下利不欲食者以有宿食故也傷食惡食凡禁口利亦必因宿食之故當須下之宜大承氣湯下利差後至其年月日復發者以病不盡故也當下之宜大承氣湯下利脈反滑當有所去脈滑則實邪不留下之乃愈宜大承氣湯病腹中滿痛者此為實也當下之宜大承氣湯脈雙弦而遲者必心下鞭木邪乘土脈大而緊者陽中有隂也大為陽緊為隂可以下之宜大承氣湯按以上七條見傷寒論可下條內似指雜症可下法不入六經治法中小承氣湯二大承氣去芒硝厚朴枳實亦减大黃四兩厚朴二兩枳實三枚右三味以水四升者取一升二合去渣分溫二服初服湯當更衣不爾者盡飲之若更衣勿服陽明病脈遲雖汗出不惡寒者凡汗出者皆惡寒其身必重短氣腹滿而喘有潮熱者以上皆內實之症此外欲解不惡寒可攻裡也手足濈然汗出者此大便已鞭也四支為諸陽之本濈然汗出陽氣已盛於土中矣以此驗大便之鞭又一法大承氣湯主之若汗多微發熱惡寒者外未解也其熱未潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下腹滿不通雖外未解亦可用小承氣此方乃和胃之品非大下之峻劑故也陽明病潮熱大便微鞭者可與大承氣湯不鞭者不可與之潮熱而便不鞭亦禁下若不大便六七日恐有燥屎欲知之法少與小承氣湯入腹中轉失氣者此有燥屎也此以藥探之又一法乃可攻之若不轉失氣者此但初頭鞭後必溏不可攻之攻之必脹滿不能食也邪氣因正虛而陷入欲飲水者與水則噦寒熱相爭則噦其後發熱者必大便復鞭而少也重傷津液以小承氣湯和之仍用小承氣以大便鞭故也不轉失氣者慎不可攻也乂再申前戒聖人之慎下如此陽明病其人多汗以津液外出胃中燥大便必鞭鞭則讝語讝語由便鞭便鞭由胃燥胃燥由汗出津液少層層相因病情顯著小承氣湯主之若一服讝語止更莫復服陽明病讝語發潮熱脈滑而疾者小承氣主之因滑疾則易下故止用小承氣因與小承氣湯一升腹中轉失氣者更服一升若不轉失氣勿更與之明日不大便脈反微澀者裡虛也為難治攻之不應是為難治不可更與承氣也太陽病若吐若下若發汗後過治微煩小便數大便因鞭者因字當著眼大便之鞭由小便數之所致蓋吐下汗已傷津液而又小便太多故爾微鞭非實邪也小承氣湯和之愈下利讝語者有燥屎也利而仍讝語邪火不因利而息則必有燥屎蓋燥屎不因下利而去也後醫見利則不復下豈知燥屎之不能自出乎調胃承氣湯三大黃四兩去皮清酒洗甘草二兩炙芒硝半升右三味以水三升先煮大黃甘草取一升去滓內芒硝更上火微煮令沸少少溫服之按芒硝善解結熱之邪大承氣用之解已結之熱邪此方用之以解將結之熱邪其能調胃則全賴甘草也傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯攻其表此誤也得之便厥咽中乾煩燥吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和讝語者少與調胃承氣湯隂陽錯雜之症多方以救之必有餘邪在胃故少與以和之餘詳雜方條發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯此必發汗後無他症但現微寒微熱故止作虛實觀否則安知非更有餘邪將復變他症耶太陽病未解脈隂陽俱停脈法無停字疑似沉滯不起即下微字之義寸為陽尺為隂先振慓汗出乃解隂陽爭而復和但陽脈微者先汗出而解當發其陽但隂脈微者下之而解當和其隂若欲下之宜調胃承氣湯按此微字即上停字之意與微弱不同微弱則不當復汗下也傷寒十三日不解二候過經讝語者以有熱也當以湯下之如大小承氣之類若小便利者大便當鞭而反下利脈調和者此言下後之症知醫以丸藥下之非其治也下非誤下之法誤若自下利者脈當微厥今反和者知為內實也調胃承氣湯主之當下而下非其法餘邪未盡仍宜更下太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱鬱微煩以上皆類少陽症先其時自極吐下者邪氣乘虛陷入與調胃承氣湯以滌胃邪若不爾者不可與未經吐下則邪在半表半裡不得用下法但欲嘔胸中痛微溏者此非柴胡症以嘔故知極吐下也此段疑有誤字陽明病不吐不下心煩者未經吐下而心煩中氣實也可與調胃承氣湯太陽病三日發汗不解蒸蒸發熱者屬胃也外邪已解內熱未清此湯主之傷寒吐後腹脹滿者已吐而胃中仍滿則非上越所能愈復當下行矣與調胃承氣湯桃核承氣湯四桃仁五十個去皮尖大黃四兩甘草二兩桂枝二兩芒硝二兩右五味以水七升煮取二升半去滓內芒硝更上火微沸下火先令溫服五合日三服當微利微利則僅通大便不必定下血也太陽病不解熱結膀胱太陽之邪由經入腑其人如狂血自下下者愈膀胱多氣多血熱甚則血凝而上干心包故神昏而如狂血得熱而行故能自下則邪從血出與陽明之下燥屎同其外不解者尚未可攻外不解而攻之則邪反陷入矣當先解外宜桂枝湯外解已但小腹急結者乃可攻之宜桃核承氣湯小腹急結是蓄血現症增按宜桂枝湯四字從金匱入抵當湯五水蛭熬虻蟲去翅足熬各三十六個大黃三兩酒浸桃仁去皮尖二十個右四味以水五升煮取三升去滓溫服一升不下再服太陽病六七日過經表症仍在脈微而沉向裡反不結胸向下其人發狂者以熱在下焦少腹當鞭滿外症小便自利者內症下血乃愈所以然者以太陽隨經瘀血在裡故也抵當湯主之此亦熱結膀胱之症前桃核承氣乃治瘀血將結之時抵當乃治瘀血已結之後也太陽病身黃脈沉結少腹鞭小便不利者為無血也以上皆似血症諦因小便不利安知非濕熱不行之故不可斷為有血也小便自利其人如狂者血症諦也並無濕熱而如狂非蓄血而何如此審症無遁形矣抵當湯主之陽明症其人喜忘者必有蓄血心主血血凝則心氣結而失其官矣蓄不甚故不狂所以然者本有久瘀血故令喜忘此乃舊病非傷寒時所得者屎雖鞭大便反易血性滑利其色必黑浮血亦有隨便而下者宜抵當湯下之病人無表裡症發熱七八日過經雖脈浮數者可下之脈雖浮數而無表裡症則其發熱竟屬裡實矣七八日故可下假令已下脈數不解合熱則消穀善饑脈數不解邪本不在大便也消穀善饑蓄血本不在水穀之路故能食至六七日蓄血更久不大便者有瘀血也宜抵當湯其脈數不解而下不止必協熱而便膿血也此指服湯後之變症熱邪不因下而去又動其血則血與便合為一而為便膿血之症又當别有治法按瘀血又有但欲潄水不欲咽之症蓋唇口乾燥而腹中不能容水也抵當丸六水蛭熬虻蟲去翅足熬各二十個大黃三兩酒洗桃仁三十五個去皮尖右四味搗分為四丸以水一升煮一丸取七合服晬時當下血不下更服晬一周時也傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可餘藥宜抵當丸熱而少腹滿又小便不利必兼三者乃為血證諦不可餘藥謂此症須緩下其血用丸使之徐下十棗湯七芫花熬甘遂大㦸等分大棗十枚右三味各别搗為散以水一升半先煮大棗肥者取八合去滓內藥末強人服一錢七羸人服半錢得快下利後糜粥自養平旦溫服若下少病不除者明日更服太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞鞭滿引脅下痛水停也乾嘔短氣汗出不惡寒者此表解裡未和也不惡寒為表解以上諸症皆裡不和凡蓄水之症皆如此不特傷寒為然也十棗湯主之服此湯以下蓄飲大陷胸湯八大黃六兩去皮芒硝一升甘遂一錢七右三味以水六升先煮大黃取二升去滓內芒硝煮一兩沸內甘遂末溫服一升得快利止後服太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之經云病發於陽而反下之熱入因作結胸是也動數變遲正氣益虛膈內拒痛胃中空虛客氣動膈短氣煩燥心中懊憹陽氣內陷心下因鞭則為結胸此段明所以致結胸之由及結胸之狀最詳乃因邪在上焦誤下以虛其上焦之氣而邪隨陷入也此症與承氣法逈殊若不結胸但頭汗出餘處無汗劑頸而還小便不利身必發黃也此乃誤下而邪氣不陷入上焦反鬱於皮膚肌肉之間故現此等症傷寒六七日結胸熱實脈沉而緊心下痛按之石鞭者此段申結胸之象尤明大陷胸湯主之傷寒十餘日過經熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也結胸本無他物氣與水所停也但頭汗出者熱結在上大陷胸湯主之太陽病重發汗而復下之不大便五六日舌上燥而渴胸有蓄飲日晡所小有潮熱從心上至少腹鞭滿而痛不可近者已汗下而大痛如此知非有物之實邪矣前云膈內拒痛又云心下石鞭專指上焦說此云從心上至少腹鞭滿痛則上下皆痛其根總由心上而起與承氣症自殊大陷胸湯主之傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之誤治柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振却發熱汗出而解邪向裡而更虛故汗出為難若心下滿而鞭痛者此湯主之大陷胸丸九大黃半斤葶歷子熬芒硝杏仁各半升去皮尖熬黑右四味搗篩二味內杏仁芒硝合研如脂和散取如彈丸一枚别搗甘遂末一錢七白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效病發於陽而反下之熱入因作結胸病發於隂而反下之熱入因作痞此明所以致結胸與痞之故發熱惡寒之症則熱入於陽位而作結胸無熱惡寒之症則熱入於隂位而作痞故治結胸用寒劑治痞用溫劑也所以成結胸者以下之太早故也二病未嘗不可下但各有其時不可過早耳結胸者項亦強如柔痓狀此陷胸之外症下之則和宜大陷胸丸小陷胸湯十黃連一兩半夏半升湯洗括婁實大者一枚右三味以水六升先煮括婁取三升去滓內諸藥煮二升去渣分溫三服一服未和再服微解下黃涎便安也按大承氣所下者燥屎大陷胸所下者蓄水此所下者為黃涎涎者輕於蓄水而未成水者也審病之精用藥之切如此小結胸病正在心下按之則痛上不至心下不及少腹必按之方痛非不可近手與大陷胸症逈别脈浮滑者不若大陷胸症之沉緊其邪未入深也小陷胸湯主之白散十一桔梗貝母各三分古法二錢五分為一分巴豆一分去皮心熬黑研如脂右三味為散內巴豆更於臼中杵之以白飲和服強人服半錢匕今稱約重三分羸者减之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯巴豆得熱則行得冷則止身熱皮粟不解畏冷起寒粟欲引衣自覆者若以水潠之洗之益令熱却不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法寒實結胸結胸皆係熱陷之症此云寒實乃水氣寒冷所結之痰飲也無熱症者與三物小陷胸湯白散亦可用按活人書云與三物白散無小陷胸湯亦可用七字蓋小陷胸寒劑非無熱之所宜也麻仁丸十二即小承氣加芍藥二仁也麻子仁二升芍藥枳實各半升大黃厚朴杏仁各一升去皮尖熬别研作脂右六味為末煉蜜和丸如梧桐子大飲服十丸漸加以知為度趺陽脈浮而澀浮則胃氣強陽盛澀則小便數隂不足浮澀相搏大便則難其脾為約此即論中所云太陽陽明者脾約是也麻仁丸主之太陽正傳陽明不復再傅故可以緩法治之瀉心湯類七生薑瀉心湯一生薑四兩甘草炙人參黃芩各三兩半夏半升黃連乾薑各一兩大棗十二枚右八味以水一斗煮取六升去渣煎取三升溫服一升日三服傷寒汗出解之後胃中不和心下痞鞭乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之汗後而邪未盡必有留飲在心下其症甚雜而方中諸藥一一對症內中又有一藥治兩症者亦有兩藥合治一症者錯綜變化攻補兼施寒熱互用皆本內經立方諸法其藥性又有與神農本草所載無處不合學者能於此等方講求其理而推廣之則操縱在我矣之凡瀉心諸法皆已汗已下已吐餘疾甘草瀉心湯二即生薑瀉心湯去人參生薑加甘草一兩甘草四兩炙黃芩乾薑各三兩半夏半升黃連一兩大棗十二枚右六味以水一斗煮取六升去滓再煎取三升溫服一升日三服傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞鞭而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非熱結但以胃中虛兩次誤下故用甘草以補胃而痞自除俗醫以甘草滿中為痞嘔禁用之藥蓋不知虛實之義者也客氣上逆故使鞭也甘草瀉心湯主之半夏瀉心湯三半夏半升黃芩乾薑甘草炙人參各三兩黃連一兩大棗十二枚右七味以水一斗煮取六升去渣再煎取三升溫服一升日三服傷寒五六日嘔而發熱者柴胡湯症具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振却發熱汗出而解本症仍在則即用本方治之若心滿而不痛者此為痞又指不痛二字痞症尤的柴胡不中與之宜半夏瀉心湯以上三瀉心之藥大半皆本於柴胡湯故其所治之症多與柴胡症相同而加治虛治痞之藥耳大黃黃連瀉心湯四大黃二兩黃連一兩右二味以麻沸湯二升漬之須臾絞去渣分溫再服此又法之最竒者不取煎而取泡欲其輕揚清淡以滌上焦之邪脈浮而緊而復下之緊反入裡則作痞緊脈為隂此所謂病發於隂下之作痞是也按之自濡但氣痞耳并無脅下之水心下痞按之濡其關上浮者邪氣甚髙大黃黃連瀉心湯主之傷寒大下後復發汗再誤心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜此湯詳見前桂枝類中附子瀉心湯五大黃二兩酒浸黃連炒黃芩炒各一兩附子一枚去皮别煮取汁右四味切三味以麻沸湯二升漬之須臾絞去渣內附子汁分溫再服此法更精附子用煎三味用泡扶陽欲其熱而性重開痞欲其生而性輕也心下痞而復惡寒汗出者附子瀉心湯主之此條不過二語而妙理無窮前條發汗之後惡寒則用桂枝此條汗出惡寒則用附子蓋發汗之後汗已止而猶惡寒乃表邪未盡故先用桂枝以去表邪此惡寒而仍汗出則亡陽在即故加入附子以回陽氣又彼先後分二方此併一方者何也蓋彼有表復有裡此則祇有裡病故有分有合也黃連湯六即半夏瀉心湯去黃芩加桂枝黃連甘草炙乾薑桂枝去皮各三兩人參二兩半夏半升大棗十二枚右七味以水一斗煮取六升去滓溫服一升日三夜二服治上焦之病故服藥宜少而數傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之諸瀉心之法皆治心胃之間寒熱不調全屬裡症此方以黃芩易桂枝去瀉心之名而曰黃連湯乃表邪尚有一分未盡胃中邪氣尚當外達故加桂枝一味以和表裡則意無不到矣黃芩湯七黃芩三兩甘草炙芍藥各二兩大棗十二枚右四味以水一斗煮取三升去滓溫服一升日再夜一服黃芩加半夏生薑湯八黃芩三兩甘草炙芍藥各二兩半夏半升生薑三兩大棗十二枚右六味以水一斗煮取三升去渣溫服一升日再夜一服太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之下利即專於治利不雜以風寒表藥此亦急當救裡之義若嘔亦即兼以止嘔之藥總之見症施治服藥後而本症愈復見他症則仍見症施治可推而知也乾薑黃連黃芩人參湯九乾薑黃連黃芩人參各三兩右四味以水六升煮取二升去渣分溫再服傷寒本自寒下本症醫復吐下之誤治寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯主之此屬厥隂條寒格自用乾薑吐下自用芩連因誤治而虛其正氣則用人參分途而治無所不包又各不相礙古方之所以入化也旋復代赭湯十旋復花三兩人參二兩生薑五兩甘草三兩炙半夏半升代赭石一兩大棗十二枚右七味以水一斗煮取六升去渣再煎取三升溫服一升日三服傷寒發汗若吐若下解後病久治多未必皆屬誤治心下痞鞭噫氣不除靈樞口問篇云寒氣客於胃厥逆從下上散復出於胃故為噫俗名噯氣皆隂陽不和於中之故旋復代赭湯主之此乃病已向愈中有留邪在於心胃之間與前諸瀉心法大約相近本草云旋復治結氣脅下滿代赭治腹中邪毒氣加此二物以治噫餘則散痞補虛之法也厚朴生薑甘草半夏人參湯十一厚朴半斤炙去皮生薑半夏各半斤甘草二兩人參一兩右五味以水一斗煮取三升去滓溫服一升日三服發汗後腹脹滿者此湯主之發汗後則邪氣已去而猶腹脹滿乃虛邪入腹故以厚朴除脹滿餘則補虛助胃也白虎湯類八白虎湯一知母六兩石膏一斤甘草二兩炙粳米六合右四味以水一斗煮米熟湯成火候去滓溫服一升日三服傷寒脈浮滑此表有熱裏有寒此寒熱二字必倒誤乃表有寒裏有熱也觀下條脈滑而厥者裡有熱也鑿鑿可證活人書作表裏有熱亦未穩白虎湯主之傷寒脈滑而厥者熱厥裏有熱也白虎湯主之三陽合病腹滿身重難以轉側口不仁而面垢讝語遺尿以上皆陽明熱症之在經者以三陽統於陽明也但身重腹滿則似風濕宜用术附面垢讝語則似胃實宜用承氣此處一惑生死立判如何辨别全在參觀脈症使有顯據方不誤投發汗則讝語陽從此越下之則額上生汗手足逆冷隂從此脫若自汗者白虎湯主之自汗則熱氣盛於經非石膏不治上按亡陽之症有二下焦之陽虛飛越於外而欲脫則用參附等藥以回之上焦之陽盛逼隂於外而欲上泄則用石膏以收之同一亡陽而治法逈殊細審之自明否則生死立判白虎加人參湯二白虎湯原方加人參三兩煮服同前法服桂枝湯大汗出後大煩渴不解脈洪大者此湯主之煩渴不解因汗多而胃液乾枮邪雖去而陽明之火獨熾故用此以生津止汗息火解煩汗後諸變不同總宜隨症用藥傷寒若吐若下後前汗後此吐下後七八日不解熱結在裏表裏俱熱此四字為白虎對症時時惡風表邪未盡大渴舌上乾燥而煩欲飲水數升者胃液已盡不在經不在腑亦非若承氣症之有實邪因胃口津液枮竭內火如焚欲引水自救故其象如此與熱邪在府者逈别此湯主之傷寒無大熱熱在內口燥渴心煩背微惡寒者此亦虛燥之症微惡寒謂雖惡寒而甚微又周身不寒寒獨在背知外邪已解若大惡寒則不得用此湯矣此湯主之傷寒脈浮發熱無汗無汗二字最為白虎所忌其表不解者惡寒不可與白虎湯渴欲飲水無表症者不惡寒白虎加人參湯主之白虎加參湯大段治汗吐下之後邪已去而有留熱在於陽明又因胃液乾枯故用之以生津解熱若更虛羸則為竹葉石膏湯症矣氣壯火食氣此方瀉火即所以生也竹葉石膏湯三竹葉二把石膏一斤半夏半升人參三兩麥門冬一升甘草二兩粳米半升右七味以水一斗煮取六升去滓內粳米煮米熟湯成又一煮法去米溫服一升日三服傷寒解後虛羸少氣人參麥冬氣逆欲吐者半夏竹葉竹葉石膏湯主之此仲景先生治傷寒愈後調養之方也其法專於滋養肺胃之隂氣以復津液蓋傷寒雖六經傳遍而汗吐下三者皆肺胃當之又內經云人之傷於寒也則為病熱故滋養肺胃歧黃以至仲景不易之法也後之庸醫則用溫熱之藥峻補脾腎而千聖相傳之精義消亡盡矣五苓散類九五苓散一猪苓十八銖去皮澤瀉一兩六銖白术十八銖茯苓十八銖桂枝半兩去皮右五味為末以白飲和服方寸七日三服多飲暖水汗出愈服散取其停留胸中多飲暖水取其氣散營衛太陽病發汗後大汗出胃中乾煩燥不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者與五苓散主之胃中乾而欲飲此無水也與水則愈小便不利而欲飲此蓄水也利水則愈同一渴而治法不同蓋由同一渴而渴之象及渴之餘症亦各不同也發汗已脈浮數煩渴者五苓散主之汗不盡則有留飲中風發熱六七日不解而煩有表裡症渴欲飲水水入則吐者名曰水逆胸中有水則不能容水矣五苓散主之桂枝治表餘四味治裏多飲暖水汗出愈表裏俱到本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之治痞而痞不解反渴則為水停心下之故非痞也太陽病寸緩關浮尺弱皆為虛象其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也誤治如其不下者病人不惡寒而渴者此轉屬陽明也此屬實邪小便數者大便必鞭不更衣十日無所苦也渴欲飲水者少少與之但以法救之隨症施治不執一端渴者與五苓散如其渴不止五苓散亦一法也霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之此亦表裏同治之法猪苓湯二猪苓去皮茯苓澤瀉滑石碎阿膠各一兩右五味以水四升先煮四味取二升去滓內阿膠煬消溫服七合日三陽明病若脈浮發熱渴欲飲水小便不利者猪苓湯主之此陽明之渴故與五苓相近而獨去桂枝恐助陽也論中又云陽明汗多而渴不可與猪苓湯以胃中燥不可更利其小便也少隂病下利六七日咳而嘔渴心煩不得眠者此湯主之此亦熱邪𫝊少隂之症蓋少隂口燥口乾有大承氣急下之法今止嘔渴則熱邪尚輕故用此方使熱邪從小便出其路尤近也文蛤散三文蛤五兩右一味為散以沸湯和一方寸匕服湯用五合病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起寒在肉中意欲飲水反不渴者服文蛤散此熱結在皮膚肌肉之中不在胃口故欲飲而不渴文蛤取其軟堅逐水若不差者與五苓散不應則表裡同治茯苓甘草湯四茯苓二兩桂枝二兩去皮甘草一兩炙生薑三兩右四味以水四升煮取二升分溫三服傷寒汗出而渴者五苓散主之桂枝止汗餘四味止渴不渴者茯苓甘草湯主之此方之義從未有能詮釋者蓋汗出之後而渴不止與五苓人所易知也乃汗出之後並無渴症又未指明别有何症忽無端而與茯苓甘草湯此意何居要知此處汗出二字乃發汗後汗出不止也汗出不止則亡陽在即當與以真武湯其稍輕者當與以茯苓桂枝白术甘草湯更輕者則與以此湯何以知之以三方同用茯苓知之蓋汗大泄必引腎水上泛非茯苓不能鎮之故真武則佐以附子回陽此二方則以桂枝甘草斂汗而茯苓則皆以為主藥此方之義不了然乎觀下條心悸治法益明傷寒厥而心下悸者宜先治水水犯心則悸當服茯苓甘草湯本草茯苓治心下結痛恐悸却治其厥不爾水漬入胃必作利也四逆湯類十四逆湯一甘草二兩炙乾薑一兩半附子一枚生用去皮破八片右三味以水三升煮取一升二合去滓分溫再服強人可大附子一枚常人則取中者小者可知乾薑三兩按方名四逆必以之治厥逆論云厥者隂陽氣不順接手足逆冷是也凡論中言脈沉微遲弱者則厥冷不待言而可知此方溫中散寒故附子用生者以四逆理中皆溫熱之劑而四逆一類總不離乾薑通陽也治宜下焦理中一類總不離白术以守中也治宜中焦餘藥皆相同而功用逈别傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯攻其表此誤也得之便厥咽中乾煩燥吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和讝語者少與調胃承氣湯以上義詳雜方條內若重發汗復加燒針者四逆湯主之隂陽兩虛之後又復竭其陽非此湯不能挽回陽氣傷寒醫下之續得下利清穀不止身疼痛者急當救裡後身疼痛清便自調者急當救表救裏宜四逆湯救表宜桂枝湯說詳前桂枝條內病發熱頭疼此乃表邪脈反沉見裡脈若不差身體疼痛當救其裏宜四逆湯身體疼痛隂陽二症皆有之今脈沉而疼痛雖發熱亦是裏寒外熱之症故用四逆脈浮而遲表熱浮裏寒遲下利清穀者四逆湯主之自利不渴者屬太隂以其藏有寒故也明所以不渴之故當溫之宜四逆輩有寒則不湯則知渴者皆當作熱治不曰四逆湯而曰四逆輩凡溫熱之劑皆可選用少隂病脈沉者急溫之病與脈相合則溫不可遲宜四逆湯少隂病飲食入口則吐心中溫溫欲吐復不能吐此二句指不食之時言此與少陽之嘔當有分别宜以他症驗之始得之手足寒脈弦遲者此胸中實始得言病方起脈弦則有力故知為實不可下也欲吐則病在上焦下之為逆當吐之在上者因而越之此少隂宜吐之法若膈上有寒飲乾嘔者乾嘔無物則知其為飲矣不可吐也當溫之寒飲無實物溫之則寒散而飲亦去矣凡治飲皆用溫法宜四逆湯大汗出熱不去內拘急四肢疼以上皆外症其疼亦屬隂疼又下利清穀厥逆而惡寒者三者皆虛寒內症四逆湯主之按此條諸症皆屬隂寒固為易辨惟熱不去三字則安知非表邪未盡即惡寒亦安知非太陽未罷之惡寒惟下利厥逆則所謂急當救裏不論其有表無表而扶陽不可緩矣大汗若大下利而厥冷者四逆湯主之汗下後而厥冷則虛寒極矣嘔而脈弱小便復利身有微熱見厥者難治亦外熱內虛寒之故四逆湯主之吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之以上五條皆係汗下之後陽氣大虛故雖外有微熱而總以扶陽為急大小便俱利則內陽亦盡矣不僅手足逆冷為陽微之驗也四逆加人參湯二四逆湯原方加人參一兩煎服法同惡寒脈微而復利利止亡血也按亡隂即為亡血不必真脫血也成無已注引金匱玉函曰水竭則無血謂利止則津液內竭四逆加人參湯主之加參以生津液通脈四逆湯三甘草二兩炙乾薑三兩強人四兩附子一枚生用右三味以水三升煮取一升二合去滓分溫再服其脈即出者愈面色赤者加葱九莖腹中痛者去葱加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩補益津液少隂病下利清穀裏寒外熱寒逼陽於外手足厥逆外症脈微欲絶內症身反不惡寒寒邪已入裡其人面色赤陽越或腹痛或乾嘔或咽痛陽升或利止脈不出者通脈四逆湯主之其脈即出者愈諸症或陽或隂乃閉塞不通之故用辛溫通陽之品以治之其兼症不同詳加减法下利清穀裏寒外熱汗出而厥者汗出而厥陽有立亡之象通脈四逆湯主之通脈四逆加猪膽汁湯四通脈四逆原方加猪膽汁半合煎如前法煎成內猪膽汁溫服其脈即出猪膽汁苦滑之極引藥直逹下焦吐已下斷利止也汗出而厥四肢拘急不解脈微欲絶者通脈四逆加猪膽汁湯主之乾薑附子湯五乾薑一兩附子一枚生用去皮切八片右二味以水三升煮取一升去渣頓服下之後復發汗先竭其隂後竭其陽晝日煩躁不得眠夜而安靜陽虛有二症有喜陽者有畏陽者大抵隂亦虛者畏陽隂不虛者喜陽此因下後隂亦虛故反畏陽也不嘔不渴無表證脈沉微身無大熱者此邪已退而陽氣衰弱故止用薑附回陽乾薑附子湯主之白通湯六乾薑附子湯原方加葱白四莖煎服法照前少隂病下利白通湯主之此專治少隂之利用葱白所以通少隂之陽氣白通加猪膽汁湯七白通湯原方加人尿五合猪膽汁一合右三味以水三升煮取一升去渣內膽汁人尿和令相得分溫再服無膽汁亦可少隂下利脈微者與白通湯利不止厥逆無脈乾嘔煩者無脈厥逆嘔而且煩則上下俱不通隂陽相格故加猪膽人尿引陽藥達於至隂而通之內經所云反佐以取之是也白通加猪膽汁湯主之服湯脈暴出者死微續者生暴出乃藥力所迫藥力盡則氣仍絶微續乃正氣自復故可生也少隂篇云少隂病下利不止惡寒而踡卧手足溫者可治則又當以手足之溫驗其陽之有無也前云其脈即出者愈此云暴出者死蓋暴出與即出不同暴出一時出盡即出言服藥後少頃即徐徐微續也須善會之茯苓四逆湯八茯苓四兩一本作六兩人參一兩附子一枚生用甘草二兩炙乾薑一兩半右五味以水五升煮取三升去滓溫服七合日三服發汗若下之病仍不解煩躁者此陽氣不攝而煩所謂隂煩也然亦必參以他症方不誤認為梔子湯症茯苓四逆湯主之本草茯苓治逆氣煩滿四逆散九甘草炙枳實柴胡芍藥右四味各十分搗篩白飲和服方寸七日三服咳者加五味子乾薑各五分并主下利悸者加桂枝五分小便不利者加茯苓五分腹中痛者加附子一枚炮令拆泄利下重者先以水五升煮薤白取三升去渣以散方寸七內湯中煮取一升半分溫再服别録薤白主溫中散結少隂病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者此乃少隂傳經之熱邪並無脈微惡寒等隂症即下利一端並非清穀而反下重故不得用溫熱四逆散主之疏邪通氣同名四逆與前諸法逈殊諸兼症皆在加減中當歸四逆湯十當歸桂枝芍藥細辛各三兩甘草通草各二兩大棗二十五枚右七味以水八升煮取三升溫服一升日三服當歸四逆加吳茱茰生薑湯十一當歸甘草通草各二兩芍藥桂枝細辛各三兩大棗二十五枚吳茱茰二升生薑半斤右九味以水六升清酒六升和煮取五升去渣分溫五服手足厥寒脈細欲絶者當歸四逆湯主之此四逆乃太陽傳經之邪而表症猶未罷因陽氣已虛故用桂枝湯加當歸和血細辛溫散以和表裏之陽也若其人內有久寒者宜當歸四逆加吳茱茰生薑湯主之內有久寒指平素言必從問而得之或另有現症乃為可據吳茱茰溫中散寒其性更烈按前四逆諸法皆主於溫此二方則溫中兼通陽和隂之法下利脈大者虛也凡症虛而脈反大者皆元氣不固也以其強下之故也推求所以致虛之故設脈浮革辨脈法篇云脈弦而大弦則為减大則為芤减則為寒芤則為虛虛寒相摶此名為革因而腸鳴者腸鳴亦氣不通和之故屬當歸四逆湯主之理中湯類十一理中丸一人參甘草白术乾薑各三兩右四味搗篩為末蜜和為丸如雞子黃大以沸湯數合和一丸研碎溫服之日三四服夜二服腹中未熱益至三四丸然不及湯理中丸與湯本屬一方方法以四物依兩數切用水八升煮取三升去渣溫服一升日三服急則用湯若臍上築者腎氣動也去术加桂四兩即欲作奔豚桂枝加桂之法吐多者去术加生薑二兩有乾薑而復加生薑知乾薑不治嘔也下多者還用术术能止利悸者加茯苓二兩悸為心下有水故用茯苓渴欲飲水者加术足前成四兩半消飲生津腹中痛者加人參足前成四兩半此痛因氣不足之故别録云人參治心腹鼓痛寒者加乾薑足前成四兩半腹滿者去术加附子一枚此腹滿乃陽氣不充之故服湯後如食頃飲熱粥一升許微自溫勿揭衣被桂枝湯之飲熱粥欲其助藥力以外散此飲熱粥欲其助藥力以內溫霍亂頭痛發熱身疼痛論中又云嘔吐而利名曰霍亂又云頭痛則身疼惡寒吐利名曰霍亂合觀之則霍亂之症始備蓋亦傷寒之類後人以暑月之吐利當之而亦用理中更造為大順散者皆無稽之論也熱多欲飲水者五苓散主之此熱勝寒之霍亂寒多不用水者理中湯主之此寒勝熱之霍亂和按霍亂之症皆由寒熱之氣不隂陽拒格上下不通水火不濟之所致五苓所以分其清濁理中所以壯其陽氣皆中焦之治法也大病差後喜唾胃液不藏兼有寒飲久不了了胃上有寒當以丸藥理之當緩治之宜理中丸真武湯二茯苓芍藥生薑各三兩白术二兩附子一枚泡右五味以水八升煮取三升去渣溫服七合日三服若嗽者加五味子半升細辛乾薑各一兩若小便利者去茯苓若下利者去芍藥加乾薑二兩此即下利清穀之類故去芍藥加乾薑若熱利則芍藥又為要藥也須審之若嘔者去附子加生薑足前成半斤太陽病發汗汗出不解太陽病乃桂枝症也其發汗當取微似汗則衛氣泄而不傷營若發汗太過動其營血大汗雖出而衛邪反內伏所以病仍不解觀前桂枝湯條下服法可推而知也其人仍發熱表邪仍在心下悸下焦腎水因心液不足隨陽而上犯頭眩身瞤動振振欲劈地者陽氣泄則虛浮無依著真武湯主之此方鎮伏腎水挽回陽氣少隂病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者以上濕邪之症此為有水氣水亦濕也其人或咳或小便利或下利或嘔者此四症或有或無方中加減法俱詳真武湯主之此方因發汗不合法上焦之津液乾枮腎水上救以此鎮腎氣治逆水不專為汗多亡陽而設治亡陽之方諸四逆湯乃正法也附子湯三附子二枚炮茯苓三兩人參二兩白术四兩芍藥三兩右五味以水八升煮取三升去滓溫服一升日三服少隂病得之一二日口中和寒邪已微其背惡寒者當灸之但背惡寒則寒邪聚於一處故用灸法此按白虎加人參湯亦有背微惡寒之症乃彼用寒凉用溫熱何也蓋惡寒既有微甚之不同而其相反處全在口中和與口燥渴之逈别故欲知裡症之寒熱全在渴不渴辨之此傷寒之要訣也附子湯主之此乃病已向愈正氣虛而餘寒尚存之證也少隂病身體疼手足寒骨節痛脈沉者附子湯主之此亦虛寒餘症甘草附子湯四甘草二兩炙白术二兩桂枝四兩附子二枚炮右四味以水六升煮取三升去渣溫服一升日三服初服得微汗則解即服桂枝湯論中所云風濕發汗汗大出者但風氣去濕氣在是故不愈也治風濕者發其汗但微微似欲出汗者風濕俱去也能食汗出復煩者尚有餘邪鬱而未盡服五合恐一升多者服六七合為始此言初服之始風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者此湯主之此段形容風濕之狀病情略備桂枝附子湯五桂枝四兩附子三枚泡去皮切八片甘草二兩生薑三兩大棗十二枚右五味以水六升煮取二升去滓分溫三服按此即桂枝去芍藥加附子湯但彼桂枝用三兩附子用一枚以治下後脈促胸滿之症此桂枝加一兩附子加二枚以治風濕身疼脈浮澀之症一方而治病逈殊方名亦異彼編入桂枝湯類此編入理中湯類細思之各當其理分兩之不可忽如此義亦精矣後人何得以古方輕於加減也桂枝附子去桂加白术湯六白术四兩甘草二兩附子三枚炮生薑三兩大棗十二枚右五味以水六升煮取二升去滓分溫三服初服其人身如痺半日許復服之三服盡其人如冒狀勿怪此以附术併走皮內逐水氣附术併力則逐水之功愈矣未得除故使之耳法當加桂四兩此即前桂枝附子湯此本一方二法以大便鞭小便自利去桂也以大便不鞭小便不利當加桂觀此條知桂枝能通小便故五苓散用之附子三枚恐多也虛弱家及産婦宜减服之附子能劫隂氣傷寒八九日風濕相搏身體疼煩不能自轉側濕則身重不嘔不渴濕而兼寒脈虛浮而澀者內外之陽俱虛桂枝附子湯主之若其人大便鞭小便自利者去桂加白术湯主之白术生腸胃之津液茯苓桂枝白术甘草湯七茯苓四兩桂枝三兩去皮白术甘草各二兩炙右四味以水六升煮取三升去渣分溫三服傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者此湯主之此亦陽虛而動腎水之症即真武症之輕者故其法亦仿真武之意芍藥甘草附子湯八芍藥甘草各三兩附子一枚炮去皮破八片右三味以水五升煮取一升五合去渣分溫三服發汗病不解反惡寒者虛故也此湯主之甘草附子加芍藥即有和隂之意亦邪之甚輕者桂枝人參湯九桂枝四兩甘草四兩炙白术人參乾薑各三兩右五味以水九升先煮四味取五升內桂更煮取三升桂獨後煮欲其於治裡症藥中越出於表以散其邪也去渣溫服一升日再夜一服太陽病外症未除而數下之下之太早又多遂協熱而利利下不止邪陷入裡心下痞鞭邪在上焦猶屬半表表宜桂枝裏宜餘四味不解桂枝人參湯主之此必數下之後而現虛症故雖協熱而仍用溫補雜法方類十二赤石脂禹餘糧湯一論中有汗家重發汗必恍惚心亂小便已隂疼與禹餘糧丸疑即此為丸赤石脂禹餘糧各一斤右二味以水六升煮取二升去滓分溫三服二石同煎方中絶少傷寒服湯藥下利不止心下痞鞭服瀉心湯已復以他藥下之利不止一誤再誤醫以理中與之利益甚理中者理中焦也此利在下焦下藥太過則大腸受傷赤石脂禹餘糧湯主之以澀治脫復利不止當利其小便分其清濁則便自堅炙甘草湯二又名復脈湯甘草四兩炙生薑三兩人參二兩生地黃一斤桂枝三兩麥門冬半斤阿膠二兩麻仁半斤大棗三十枚右九味以清酒七升水八升先煮八味取三升去渣內膠煬消盡溫服一升日三服傷寒脈結代脈來緩而時一止復來曰結脈來動而中止不能自還因而復動曰代幾動一息亦曰代皆氣血兩虛而經隧不通隂陽不交之故心動悸心主脈脈之止息皆心氣不寧之故炙甘草湯主之此治傷寒邪盡之後氣血兩虛之主方也活人書云隂盛則結陽盛則促甘草乾薑湯三甘草四兩炙乾薑二兩炮右二味以水三升煮取一升五合去滓分溫再服芍藥甘草湯四芍藥四兩甘草四兩右二味以水三升煮取一升五合去滓分溫再服傷寒脈浮自汗出小便數心煩微惡寒以上俱似桂枝症腳攣急裏虛之象只此一症决非桂枝症矣凡辨症必於獨異處著眼反與桂枝湯欲攻其表此誤也得之便厥咽中乾煩燥吐逆者有陽越之象作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸此湯乃純隂之劑以復其隂也隂陽兩和而腳伸矣若胃氣不和讝語者留邪在中焦少與調胃承氣湯若重發汗復加燒針者四逆湯主之詳見四逆湯條下問曰證象陽旦活人書云桂枝湯加黃芩曰陽旦成無已云即桂枝湯别名按法治之而增劇厥逆咽中乾兩脛拘急而譫語以上言按法用方而病不應手其故安在師言夜半手足當溫兩腳當伸後如師言何以知之答曰寸口脈浮而大浮則為風大則為虛風則生微熱虛則兩脛攣病證象桂枝因加附子參其間桂枝加附子湯增桂令汗出附子溫經亡陽故也厥逆兩脛拘急即陽亡之兆厥逆咽中乾煩燥陽明內結陽越在上讝語煩亂更飲甘草乾薑湯通納陽氣夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯陽復而隂又虛以此養隂氣爾乃腳伸以承氣湯微溏則止其讝語以滌陽明所結之餘邪故知病可愈病證象桂枝句以下歷叙治效以明用藥之次第當如此蓋病證既多斷無一方能治之理必先分證而施方而其先後之序乂不可亂其方有前後截然相反者亦不得以錯雜為嫌隨機應變神妙無方而乂規矩不亂故天下無不可愈之疾後人欲以一方治諸症又無一味中病之藥嗚呼難哉茵陳蒿湯五茵陳蒿六兩梔子十四枚大黃二兩右三味以水一斗先煮茵陳减六升茵陳為主藥內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹减病從小便去也先煮茵陳則大黃從小便出此祕法也陽明病發熱汗出者此為熱越不能發黃也但頭汗出者身無汗劑頸而還小便不利渴欲飲水者此為瘀熱在裏身必發黃茵陳湯主之本草茵陳主熱結黃疸傷寒七八日身黃如橘子色小便不利腹微滿者陽明瘀熱茵陳湯主之麻黃連軺赤小豆湯六麻黃二兩去節連軺二兩赤小豆一升生梓白皮一升杏仁四十枚甘草二兩生薑二兩大棗十二枚右八味以潦一斗無根之水先煮麻黃再沸去上沫內諸藥煮取三升去滓分溫三服半日服盡連軺即連翹根氣味相近今人不採即以連翹代可也傷寒瘀熱在裏身必發黃此湯主之前方欲黃從下解此方欲黃從汗解乃有表無表之分也麻黃升麻湯七麻黃二兩半升麻一兩一分當歸一兩一分知母黃芩萎㽔各十八銖白术石膏乾薑芍藥天冬桂枝茯苓甘草各六銖右十四味以水一斗先煮麻黃一兩沸去上沫內諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者皆上熱下寒之症為難治此湯主之此乃傷寒壞症寒熱互見上下兩傷故藥亦照症施治病症之雜藥味之多古方所僅見觀此可悟古人用藥之法瓜蒂散八瓜蒂熬黃赤小豆各一分右二味各别搗篩為散已合治之取一錢匕以香䜴一合用熱湯七合煮作稀糜去滓和散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與之此即論中所云吐法也梔子䜴湯治虛煩非專引吐此方則專於引吐而已病如桂枝症頭不痛項不強寸脈微浮胸中痞鞭氣上冲咽喉不得息者此為胸中有寒也寒必兼飲當吐之在上者越之宜瓜蒂散本草瓜蒂病在胸腹中皆吐下之病人手足厥冷脈乍緊者邪結在胸中所以陽氣不能四達心中滿而煩饑不能食者病在胸中當須吐之宜瓜蒂散吳茱茰湯九吳茱茰一升洗人參三兩生薑六兩大棗十二枚右四味以水七升煮取二升去渣溫服七合日三服食穀欲嘔者必食穀而嘔受病在納穀之處與乾嘔逈别屬陽明也吳茱茰湯主之得湯反劇者屬上焦也上焦指胸中陽明乃中焦也少隂病吐利手足逆冷煩燥欲死者吳茱茰湯主之此胃氣虛寒之症乾嘔吐涎沫此涎沫非少陽之乾嘔然亦云乾嘔者謂不必食穀而亦嘔也頭痛者陽明之脈上於頭吳茱茰湯主之此胃中有寒飲之症黃連阿膠湯十黃連四兩黃芩一兩芍藥二兩阿膠三兩雞子黃二枚右五味以水六升煮三物取二升去渣內膠煬盡小冷內雞子黃小冷而內雞子黃則不至凝結而相和攪令相得溫服七合日三服少隂病得之二三日以上心中煩不得卧此湯主之此少隂傳經之熱邪擾動少隂之氣故以降火養隂為治而以雞子黃引藥下達桃花湯十一赤石脂一斤一半全用一半篩末乾薑一兩粳米一升右三味以水七升煮米令熟去滓內赤石脂末方寸七溫服七合日三服若一服愈餘勿服兼末服取其留滯收澀少隂病下利便膿血寒熱不調則大腸為腐故成膿血與下利清穀絶不同桃花湯主之本草赤石脂療下利赤白少隂病二三日至四五日腹痛小便不利下痢不止便膿血者桃花湯主之半夏散及陽十二半夏洗桂枝去皮甘草炙右三味等分各别搗篩已合治之白飲和服方寸七日三服若不能散服者以水一升煎七沸內散兩方寸七更煎三沸下火令小冷少少咽之治上之藥當小其劑少隂病咽中痛足少隂之脈循喉嚨挾舌本半夏散及湯主之本草半夏治喉咽腫痛桂枝治喉痺此乃咽喉之主藥後人以二味為禁藥何也猪膚湯十三猪膚一斤右一味以水一斗煮取五升去渣加白蜜一升白粉五合當是米粉熬香和令相得溫分六服少隂病下利咽痛胸滿心煩者此亦中焦氣虛隂火上炎之症猪膚湯主之以甘鹹納之甘草湯十四甘草二兩右一味以水三升煮取一升五合去滓溫服七合日二服桔梗湯十五桔梗一兩甘草二兩右二味以水三升煮取一升去渣分溫再服少隂病二三日咽痛者可與甘草湯大甘為土之正味能制腎水越上之火不差與桔梗湯佐以辛苦開散之品别録云療咽喉痛苦酒湯十六半夏十四枚雞子一枚去黃右二味內半夏著苦酒中以雞子殼置刀環中安火上令三沸此等煮法必有深意疑即古所云禁方也去渣少少含咽之不差更作三劑少隂病咽中傷生瘡疑即隂火喉癬之類不能言語聲不出者苦酒湯主之咽中生瘡此必遷延病久咽喉為火所蒸腐此非湯劑之所能療用此藥斂火降氣內治而兼外治法也烏梅丸十七烏梅三百枚細辛六兩乾薑十兩當歸四兩黃連一斤附子六兩炮去皮蜀椒四兩去汗桂枝六兩去皮人參六兩黃蘖六兩右十味異搗篩合治之以苦酒浸烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下圓如梧桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等傷寒脈微而厥至七八日膚冷陽氣不衛其人躁無暫安時者此為藏厥此症不治非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩此為藏寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之又主久痢此治久痢之聖方也其能治蛔諸藥之性當於神農本草中細細審辨諸方盡然不復一一具載白頭翁湯十八白頭翁二兩黃連黃蘖秦皮各三兩右四味以水七升煮取二升去滓溫服一升不愈更服一升熱利下重者白頭翁湯主之凡下重皆屬於熱下利欲飲水者以有熱故也白頭翁湯主之牡蠣澤瀉散十九牡蠣澤瀉蜀漆洗去腥括婁根葶藶子商陸根熬海藻洗去鹽以上各等分右七味異搗下篩為散更入臼中杵之白飲和服方寸匕小便利止後服大病差後從腰以下有水氣者水流向下牡蠣澤瀉散主之此治水病之主方蜜煎導方二十蜜七合右一味於銅器內微火煎凝如飴狀攪之勿令焦灼俟可丸併手捻作錠令頭鋭大如指長二寸許當熱時急作冷則鞭以內穀道中以手急抱欲大便時乃去之猪膽汁方草一大猪膽一枚瀉汁和醋少許以灌穀道中如一食頃當大便出宿食惡物甚效陽明病自汗出若發汗小便自利者此乃津液內竭雖鞭不可攻之當須自欲大便須待也言必待其自欲大便而後用此法宜蜜煎導而通之若土瓜根及大猪膽汁皆可為導燒裩散草二右取婦人中裩近隂處剪燒灰以水和服方寸七日三服小便即利隂頭微腫則愈婦人病取男子裩當燒灰引其邪火從隂處出也傷寒隂陽易之為病病方愈而交接則感其餘熱而生疾其人身體重少氣少腹裏急或引隂中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒裩散主之六經脈證欲讀傷寒論必先識六經之本證然後論中所稱太陽陽明等病其源流變態形色脈象當一一備記了然於心然後其症之分併疑似及用藥加减異同之故可以曉然不致眩惑貽誤故備録於左太陽病脈浮頭項強痛而惡寒尺寸俱浮者太陽受病也其脈上連風府故頭項痛腰脊強發熱汗出惡風脈緩者名曰中風惡寒體痛嘔逆脈隂陽俱緊者名曰傷寒發熱惡寒者發於陽也無熱惡寒者發於隂也發於陽者七日愈發於隂者六日愈以陽數七隂數六也陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊惡寒未離太陽也陽明病若能食名中風不能食名中寒尺寸俱長者陽明受病也其脈俠鼻絡於目故身熱目疼鼻乾不得卧陽明外證身熱汗自出不惡寒反惡熱也陽明脈大以上皆陽明之經病有太陽陽明有正陽陽明有少陽陽明太陽陽明者脾約是也少陽陽明者發汗利小便已胃中燥煩實大便難是也陽明之為病胃家實也此乃正陽陽明陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也少陽之為病口苦舌乾目眩也尺寸俱弦者少陽受病也其脈循脅絡於耳故胸脅痛而耳聾少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚傷寒脈弦細頭痛發熱者屬少陽三陽合病脈浮大上關上但欲眠睡目合則汗內熱已極傷寒六七日無大熱外熱輕則內熱重其人煩燥者此為陽去入隂也傷寒三日三陽為盡三隂當受邪其人反能食而不嘔此為三隂不受邪也太隂之為病腹滿而吐食不下自利益甚時腹自痛尺寸俱沉細者太隂受病也其脈布胃中絡於嗌故腹滿而嗌乾傷寒脈浮而緩手足自溫者繫在太隂自利不渴者屬太隂以藏有寒故也當溫之宜服四逆輩少隂自利而渴寒在下焦也此自利不渴寒在中焦也少隂之為病脈微細但欲寐也衛氣行於陽則寤行於隂則寐少隂病欲吐不吐心煩但欲寐五六日自利而渴者屬少隂也尺寸俱沉者少隂受病也以其脈貫腎絡於肺繫舌本故口燥舌乾而渴厥隂之為病消渴氣上撞心心中疼熱饑而不欲食食則吐蛔下之利不止尺寸俱微緩者厥隂受病也以其脈循隂器絡於肝故煩滿而囊縮厥隂中風脈微浮為欲愈不浮為未愈别症變症附刺法傷寒本症之外有别症有變症别症者其病與傷寒相類而實非傷寒是也變症者傷寒本不當有此症或因遷延時日或因雜藥誤投其病變態百出是也其症不備則必驚疑淆惑而無所措手故備録之庶不致臨症倣徨藏結冷結除中伏氣晚發痓濕風濕濕溫溫毒暍隂毒陽毒溫病熱病兩感風溫溫疫腳氣多眠狐惑百合藏厥見烏梅丸條尸厥見刺法藏結藏結如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰藏結舌上白胎滑者難治藏結無陽症其人反靜舌上胎滑者不可攻也病脅下素有痞連在臍旁痛引少腹入隂經者此名藏結死藏結與結胸皆下後邪氣乘虛入裏所致熱多與陽明相結為結胸寒多與隂相結為藏結故所現脈症皆為隂象舌上胎滑則上焦亦寒全無陽象故曰難治曰不可攻然猶有治法至素有痞疾則中氣已傷連及臍旁少腹并入隂經則上下俱病隂極陽竭不死何待冷結病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也除中傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死微則為咳咳則吐逆下之則咳止而利因不休利不休則胸中如蟲齧粥入則出小便不利兩脅拘急喘息為難頸背相引臂則不仁極寒反汗出身冷若冰眼睛不慧語言不休而穀氣多入此為除中口雖欲言舌不得前傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食恐為除中此病無治法伏氣伏氣之病以意候之今月之內欲有伏氣假令舊有伏氣當須脈之若脈微弱當喉中痛似傷寒非喉痺也病人云實咽中痛雖爾今復欲下痢活人書云伏氣之病謂非時有暴寒中人伏於少隂經始不竟病旬月乃發脈便微弱法先咽痛似傷寒非咽痺之病次必下利始用半夏桂枝甘草湯主之次四逆散主之此病只二日便差古方謂之腎傷寒也甘草半夏桂心等分每服四錢七入生薑四片煎放冷少少含咽之晚發脈隂陽俱緊至於吐利其脈獨不解緊去人安此為欲解若脈遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解活人書傷寒病三月至夏為晚發痓太陽病發熱無汗反惡寒者名曰剛痓金匱治剛痓用葛根湯大承氣湯見湯俱前太陽病發熱汗出不惡寒者名曰柔痓柔痓用括婁桂枝湯即桂枝湯加括婁根二兩太陽病發汗太多因致痓太陽發熱脈沉而細者名曰痓此言痓脈病身熱足寒頸項強急惡寒時頭熱面赤目脈赤獨頭搖卒口噤背反張者痓病也此言痓象濕太陽病關節疼痛而煩脈沉而細者此名濕痺之候其人小便不利大便反快但當利其小便濕家之為病一身盡疼發熱身色如似薰黃濕家下之額上汗出微喘小便利者死若下利不止者亦死濕家下之其人但頭汗出背強欲得被覆向火若下之早則噦胸滿小便不利舌上如胎者以丹田有熱胸中有寒渴欲得水而不能飲則口燥煩也濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈風濕問曰風濕相搏一身盡疼痛法當汗出而解值天隂雨不止醫云此可發汗汗之不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也此言治法病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也風濕脈浮肢體痛重不可轉側額上微汗不欲去被或身微腫濕溫兩脛逆冷胸腹滿多汗頭目痛苦妄言其脈陽濡而弱隂小而急不可發汗治在太隂見活人書溫毒冬時觸冒疹毒至春始發肌肉發斑癮疹如錦紋或咳嗽心悶但嘔清汁見活人書暍太陽中熱者暍是也其人汗出惡寒身熱而渴也太陽中暍者身熱疼重而脈微弱此亦夏月傷冷水水行皮中所致也太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚隂毒手足厥冷背強臍腹築痛咽痛短氣嘔吐下利身如被杖或冷汗煩渴或甲指面色青黑煩躁而渴脈沉細欲絶而一息七至宜灸氣海丹田三二百壯或葱尉臍中氣海在臍下一寸五分丹田在臍下二寸陽毒發躁狂走妄言面赤咽痛身斑斑若錦紋或下利赤黃脈洪實滑促或舌卷焦黑鼻中如烟煤宜用布漬冷水搭於胸上蒸熱數換活人書法溫病冬時受寒藏於肌膚至春而發熱病寒氣至夏而發俱與傷寒相似兩感大陽與少隂陽明與太隂少陽與厥隂風溫其人素傷於風因復傷熱其脈尺寸俱浮頭疼身熱常自汗出體重而喘四肢不收默默但欲眠發汗則讝語煩躁狀若驚癎溫疫一歲之中男女老少之疾相似其狀不一腳氣頭疼身熱肢體痛大便祕嘔逆腳屈弱多眠有風溫症有少隂症有小柴胡證有狐惑症狐惑此症治法詳金匱狀如傷寒或傷寒後變症默默欲眠目不能閉不欲飲食面目乍白乍赤乍黑蟲食其喉為惑其聲嗄蝕其肛為狐其咽乾爛見五臟則死當視其唇上唇有瘡蟲食其臟下唇有瘡蟲食其肛多因下利而得濕䘌之病亦相似百合此症詳金匱治法亦備此亦傷寒變症百脈一宗悉致其病百脈一宗乃肺病也故金匱用百合治之其狀欲食復不能食默默欲卧復不能卧欲行復不能行飲食或有美時或有惡聞食臭時如寒無寒如熱無熱小便赤藥入口即吐如有神靈者刺法古聖人治病之法針灸為先靈素所論皆為針灸而設即治傷寒亦皆用針刺熱病篇所載是也至仲景專以湯劑治傷寒尤為變化神妙然亦有湯劑所必不能愈而必用刺者仲景亦不能舍此而為治後人豈可不知故另考明諸穴以附於後尸厥少隂脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸隂股與隂相動令身不仁此為尸厥當刺期門巨闕見平脈法期門二穴在第二肋端不容穴傍各一寸五分上直兩乳足太隂厥隂隂維之會舉臂取之刺入四分灸五壯肝募也巨闕一穴在鳩尾下一寸任脈氣所發刺入六分留七呼灸五壯心募也傷寒腹滿讝語寸口脈浮而緊此肝乘脾也名曰縱刺期門縱者尅其所勝放縱不收也傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門橫者犯其所不勝橫逆犯上也刺期門皆所以泄肝之盛氣期門穴見前太陽與少陽併病頭項強痛或眩冒時如結胸心下痞鞭者當刺大椎第一間肺俞肝俞慎不可發汗發汗則讝語脈弦五六日讝語不止刺期門大椎一穴在第一椎陷者中三陽督脈之㑹刺入五分灸九壯肺俞二穴在第三椎下兩旁各一寸五分刺入三分留七呼灸三壯肝俞二穴在第九椎下兩傍各一寸五分刺三分留六呼灸三壯太陽少陽併病心下鞭頸項強而眩者當刺大椎肺俞肝俞慎勿下之陽明病下血讝語者此為熱入血室但頭汗出者刺期門隨其熱而瀉之濈然汗出者愈此男子熱入血室之症婦人亦有之見小柴胡條下凡治溫病可刺五十九穴內經熱俞五十九頭上五行行五者以越諸陽之熱逆也大杼膺俞缺盆背俞此八者以瀉胸中之熱也氣衝三里巨虛上下廉此八者以瀉胃中之熱也雲門䯞骨委中髓空此八者以瀉四支之熱也五臟俞旁五此十者以瀉五臟之熱也凡此五十九穴者皆熱之左右也傷寒類方卷下
