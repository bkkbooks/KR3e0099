body:
  text: 傷寒類方目録醫家類卷上桂枝湯類一十九方桂枝湯桂枝加附子湯桂枝加桂湯桂枝去芍藥湯桂枝去芍藥加附子湯桂枝加厚朴杏仁湯小建中湯桂枝加芍藥生薑人參新加湯桂枝甘草湯茯苓桂枝甘草大棗湯桂枝麻黄各半湯桂枝二麻黄一湯桂枝二越婢一湯桂枝去桂加茯苓白术湯桂枝去芍藥加蜀漆龍骨牡蠣救逆湯桂枝甘草龍骨牡蠣湯桂枝加葛根湯桂枝加芍藥湯桂枝加大黄湯麻黄湯類二六方麻黄湯麻黄杏仁甘草石羔湯大青龍湯小青龍湯麻黄附子細辛湯麻黄附子甘草湯葛根湯類三三方葛根湯葛根黄芩黄連湯葛根加半夏湯柴胡湯類四六方小柴胡湯大柴胡湯柴胡加桂枝湯柴胡加龍骨牡蠣湯柴胡桂枝亁薑湯柴胡加芒硝湯梔子湯類五七方梔子䜴湯梔子甘草䜴湯梔子生薑䜴湯梔子亁薑湯梔子厚朴枳實湯梔子檗皮湯枳實梔子豉湯卷下承氣湯類六十二方大承氣湯小承氣湯調胃承氣湯桃仁承氣湯抵當湯抵當丸十棗湯大䧟胸湯大䧟胸丸小䧟胸湯白散麻仁丸㵼心湯類七十一方生薑㵼心湯甘草㵼心湯半夏㵼心湯大黄黄連㵼心湯附子㵼心湯黄連湯黄芩湯黄芩加半夏生薑湯亁薑黄連黄芩人參湯旋復代赭石湯厚朴生薑甘草半夏人參湯白虎湯類八三方白虎湯白虎加人參湯竹葉石羔湯五苓湯類九四方五苓散猪苓湯文蛤散茯苓甘草湯四逆湯類十十一方四逆湯四逆加人參湯通脈四逆湯通脈四逆加猪胆汁湯乾薑附子湯茯苓四逆湯白通湯白通加猪胆汁湯四逆散當歸四逆湯當歸四逆加呉茱茰生薑湯理中湯類十一九方理中丸真武湯附子湯甘草附子湯桂枝附子湯桂枝附子去桂加白术湯茯苓桂枝白术甘草湯芍藥甘草附子湯桂枝人參湯雜方十二廿二方赤石脂禹餘糧湯炙甘草湯甘草乾薑湯芍藥甘草湯茵陳蒿湯麻黄連軺赤小豆湯𤓰蒂散麻黄升麻湯黄連阿膠湯呉茱茰湯半夏散及湯桃花湯猪膚湯甘草湯桔梗湯苦酒湯烏梅丸白頭翁湯牡蠣澤瀉散蜜煎導方猪胆汁方燒裩散以上共一百十三方臣等謹案傷寒類方二卷國朝徐大椿撰大椿字靈胎呉江人後漢張機傷寒論乃晉王叔和蒐採成書本非機所自定金聊城成無已始為作註又以已意移易篇章自後醫家屢有刋正動以錯簡為詞如治尚書者之爭洪範武成註大學者之爭古本今本迄於有明終無定論大椿以為非機依經立方之書乃救悞之書當時隨症立方本無定序於是削除隂陽六經門目但使方以類從症隨方証使人可桉症以求方而不必循經以求症雖於古人著書本意未必果符而於聚訟紛呶之中亦芟除葛藤之一術也其中辨証發明亦多精到凡分一十二類計方一百一十有三末附六經脈注又論正症之外有别証變症附以刺法皆有源委可尋自謂七年之中五易草藁乃成云乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀傷寒類方原序王叔和傷寒例云今捜採仲景舊論録其証候診脈聲色對病真方擬防世急則知傷寒論當時已無成書乃叔和之所捜集者雖分定六經而語無詮次陽經中多隂經治法隂經中多陽經治法㕘錯不一後人各生議論毎成一書必前後更易數條互相訾議各是其説愈更愈亂終無定論不知此書非仲景依經立方之書乃救誤之書也其自序云傷夭横之莫救所以尋求古訓博採衆方蓋因誤治之後變症錯雜必無循經現症之理當時著書亦不過隨症立方本無一定之次序也余始亦疑其有錯亂乃探求三十年而後悟其所以然之故於是不類經而類方蓋方之治病有定而病之變遷無定知其一定之治隨其病之千變萬化而應用不爽此從流溯源之法病無遁形矣至於用藥則各有條理解肌發汗攻邪散痞逐水驅寒温中除熱皆有主方其加減輕重又各有法度不可分毫假借細分之不外十二類毎類先定主方即以同類諸方附焉其方之精思妙用又復一一注明條分而縷悉之隨以論中用此方之症列於方後而更發明其所以然之故使讀者於病情藥性一目顯然不論從何經來從何經去而見症施治與仲景之意無不吻合豈非至便之法乎余纂集成帙之後又復鑽窮者七年而五易其稿乃無遺憾前宋朱肱活人書亦曾彚治法於方後但方不分類而又無所發明故閲之終不得其要領此書之成後之讀傷寒論者庶可以此為津梁乎乾隆二十四年歳在屠維單閼陽月上浣洄溪徐大椿序
