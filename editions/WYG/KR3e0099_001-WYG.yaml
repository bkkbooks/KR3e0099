body:
  text: 傷寒類方卷上呉江徐大椿撰桂枝湯類一桂枝湯一桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩大棗十二枚擘右五味㕮咀以水七升㣲火煮取三升去滓適寒温服一升服已須㬰歠熱稀粥一升餘以助藥力桂枝本不能發汗故須助以熱粥内經云榖入於胃以傳於肺肺主皮毛汗所從出歠粥充胃氣以達於肺也觀此可知傷寒不禁食矣温覆令一時許遍身漐漐㣲似有汗者益佳不可令如水流漓病不必除此解肌之法也若如水流漓則動營氣衛邪仍在若一服汗出病瘥停後服不必盡劑若不汗更服依前法又不汗後服小促其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病証猶在者更作服若汗不出乃服至二三劑桂枝湯全料謂之一劑三分之一謂之一服古一兩今二錢零則一劑之藥除薑棗僅一兩六錢零一服不過五錢零矣治傷寒大症分兩不過如此一服即汗不再服無汗服至二三劑總以中病為主後世見服藥得效者反令多服無效者即疑藥誤又復易方無往不誤矣禁生冷粘滑肉麪五辛酒酪及臭惡等物太陽中風陽浮而隂弱風在外故陽脈浮衛氣有邪則不能䕶營故隂脈弱陽浮者熱自發風為陽邪故發熱桂枝之辛以散之隂弱者汗自出芍藥之酸以收之甘草之甘以緩之嗇嗇惡寒淅淅惡風惡風未有不惡寒者但惡寒甚輕非若中寒及隂經之甚也翕翕發熱其熱亦不如陽明之甚鼻鳴乾嘔者鼻鳴似屬陽明乾嘔似屬少陽蓋三陽相近故畧有兼病但不甚耳桂枝湯主之太陽病頭痛發熱汗出惡風者桂枝湯主之此桂枝湯總症太陽病下之後其氣上衝者可與桂枝湯方用前法誤治若不上衝者不可與之此誤下之症誤下而仍上衝則邪氣猶在陽分故仍用桂枝發表若不上衝則其邪已下陷變病不一當隨宜施治論中誤治諸法詳觀自明太陽病初服桂枝湯反煩不解者先刺風池風府却與桂枝湯則愈此非誤治因風邪凝結於太陽之要路則藥力不能流通故刺以解其結蓋邪風太甚不僅在衛而在經刺之以洩經氣陽風府一穴在項上入髮際一寸大筋内宛宛中督脈維之㑹刺入四分留三呼風池二穴在顳顬後髪際陷者中足少陽陽維之㑹針入三分留三呼太陽病外症未解脈浮弱者當以汗解宜桂枝湯病雖過期脈症屬太陽仍不離桂枝法太陽病外症未解者不可下也此禁下總訣下之為逆欲解外者宜服言雖有當下之症而外症未除亦不可下仍宜解外而後下也太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜服脈浮而下此為誤下下後仍浮則邪不因誤下而陷入仍在太陽不得因已汗下而不復用桂枝也病嘗自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣和諧故爾榮氣和者言榮氣不病非調和之和故又申言之以營行脈中衛行脈外復發其汗營衛和則愈宜桂枝湯自汗與發汗逈别自汗乃營衛相離發汗使營衛相合自汗傷正發汗驅邪復發者因其自汗而更發之則榮衛和而自汗反止矣病人藏無他病時發熱自汗出而不愈者此衛氣不和也先其時未熱之時發汗則愈宜桂枝湯主之無他病太陽諸症不必備而惟發熱自汗故亦用桂枝湯傷寒不大便六七日宜下之候頭痛有熱者未可與承氣湯太陽症仍在不得以日久不便而下也字按未可二字從金匱増入傷寒論失此二其小便清者知不在裡仍在表也便赤為裡有熱當須發汗若頭痛者必衂汗出而頭痛未解則藴熱在經而血動矣宜桂枝湯傷寒發汗解半日許復煩脈浮數者可更發汗發汗未透故煩乃服藥不及之故宜桂枝湯傷寒醫下之續得下痢清榖不止裡症身疼痛者表症急當救裡此誤下之症邪在外而引之入隂故便清榖陽氣下脱可危雖表症未除而救裡為急傷寒論不可下篇云誤下寒多者便清榖熱多者便膿血後身疼痛清便自調者急當救表清榖已止疼痛未除仍從表治蓋凡病皆當先表後裏惟下痢清榖則以扶陽為急而表症為緩也表裏分治而序不亂後人欲以一方治數症必至兩誤救裡宜四逆湯救表宜桂枝湯太陽病發熱汗出者此為榮弱衛強故使汗出欲救邪風者宜桂枝湯提出邪風二字見桂枝為驅風聖藥陽明病脈遲汗出多㣲惡寒者表未解也可發汗宜此方陽明本自多汗但不惡寒而惡熱今多汗而猶惡寒則仍在太陽矣雖陽明病而治從太陽太隂病脈浮者可發汗宜桂枝湯太隂本無汗法因其脈獨浮則邪仍在表故亦用桂枝從脈不從症也病人煩熱汗出則解又加瘧狀有時復熱日晡所發熱者屬陽明也日晡發熱則為陽明之潮熱而非瘧矣脈實者宜下之脈虚浮者宜發汗一症而治法逈别全以脈為慿此亦從脈而不從症之法下之與大承氣湯發汗宜桂枝湯下痢腹脹滿裡症身疼痛者表症先温其裡乃攻其表温裡宜四逆湯攻表宜桂枝湯此節屬厥隂症未必由誤治而得然既見表症亦宜兼治吐痢止而身痛不休者當消息和解其外宜桂枝湯小和之裡症除而表症猶在仍宜用桂枝法輕其劑而加減之可也傷寒大下後復發汗再誤心下痞邪入中焦惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黄黄連㵼心湯苦寒開降之法詳見後桂枝加附子湯二桂枝湯原方加附子一枚炮去皮破八片右六味以水七升煮取三升去查温服一升太陽病發汗遂漏不止此發汗太過如水流漓或藥不對症之故其人惡風中風本惡風汗後當愈今仍惡風則表邪未盡也小便難津液少四肢㣲急難以屈伸四肢為諸陽之本急難屈伸乃津脱陽虚之象但不至亡陽耳若更甚而厥冷惡寒則有陽脱之慮當用四逆湯矣桂枝加附子湯主之桂枝同附子服則能止汗回陽桂枝加桂湯三桂枝原方加桂二兩即另立湯名治症逈别古聖立方之嚴如此桂枝湯原方加桂二兩右五味以水七升煮取三升去滓温服一升燒針令其汗針處被寒復感新寒核起而赤者必發奔豚氣從小腹上衝心者灸其核上各一壯不止一針故云各一壯與桂枝加桂湯重加桂枝不特禦寒且制腎氣又藥味重則能逹下凡奔豚症此方可增減用之桂枝去芍藥湯四桂枝湯原方去芍藥右四味以水七升煮取三升温服一升桂枝去芍藥加附子湯五即前方加附子一枚炮去皮破八片餘依前法太陽病下之後脈促胸滿者中虚而表邪仍在桂枝去芍藥湯主之太陽之邪未盡故用桂枝下後傷隂不宜更用凉藥若㣲惡寒者去芍藥方中加附子湯主之㣲惡寒則陽亦虚矣故加附子桂枝加厚朴杏仁湯六桂枝湯原方加厚朴二兩炙去皮杏仁五十枚右七味以水七升㣲火煮取三升温服一升覆取㣲似汗喘家作桂枝湯加厚朴杏仁佳别録厚朴主消痰下氣本經杏仁主咳逆上氣太陽病下之㣲喘者表未解故也此湯主之前條乃本然之喘此乃誤下之喘因殊而法一小建中湯七桂枝湯原方加膠飴一升右六味以水七升煮取三升去滓納飴更上㣲火消解温服一升日三服嘔家不可用建中湯以甜故也傷寒陽脈濇隂脈弦中宫之陽氣虚則木來乘土故陽濇而隂弦也法當腹中急痛先與小建中湯膠飴大甘以助中宫不差者與小柴胡湯主之治太隂不愈變而治少陽所以疎土中之木也以脈弦故用此法傷寒二三日心中悸而煩者小建中湯主之悸而煩其為虚煩可知故用建中湯以補心脾之氣蓋梔子湯治有熱之虚煩此治無熱之虚煩也桂枝加芍藥生薑人參新加湯八桂枝湯原方芍藥生薑各增一兩加人參三兩右六味以水一斗二升煮取三升去滓温服一升此以多煎為妙取其味厚入隂也發汗後身疼痛表未盡脈沈遲氣虚已甚此湯主之邪未盡宜表而氣虚不能勝散藥故用人參凡素體虚而過汗者方可用桂枝甘草湯九桂枝四兩去皮甘草二兩炙右二味以水三升煮取一升頓服此以一劑為一服者發汗過多其人义手自冒心心下悸欲得按者此湯主之發汗不誤誤在過多汗為心之液多則心氣虚二味扶陽補中此乃陽虚之輕者甚而振振欲擗地則用真武湯矣一症而輕重不同用方逈異其義精矣茯苓桂枝甘草大棗湯十茯苓半斤桂枝四兩去皮甘草二兩炙大棗十二枚擘右四味以甘爛水一斗以水二斗揚之萬遍取用之按甘爛水大約取其動極思靜意先煮茯苓凡方中專重之藥法必先煮减二升内諸藥煮取三升去渣温服一升日三服發汗後其人臍下悸者欲作奔豚此湯主之心下悸是擾胸中之陽臍下悸則因發汗太過上焦乾涸腎水上救故重用茯苓以制腎水桂枝以治奔豚桂枝麻黄各半湯十一桂枝一兩十六銖去皮芍藥生薑甘草炙麻黄去節各一兩大棗四枚杏仁二十四枚去皮及雙仁者右七味以水五升先煮麻黄一二沸去上沫欲去沫故先煮内諸藥煮取一升八合減去三之一去滓温服六合一云桂枝湯三合麻黄湯三合頓服將息如上法太陽病得之八九日過經如瘧狀發熱惡寒熱多寒少邪已漸輕其人不嘔非少陽清便欲自可無裡熱一日二三度發非瘧象脈㣲緩者不浮不弦不大為欲愈也餘邪欲退之象脈㣲而惡寒者此隂陽俱虚不可更發汗更下更吐也此三句申明上文欲愈之故蓋由病氣雖除而正氣亦衰當靜以養之使胃氣漸充則榮衛自和若更用汗吐下之法益虛其氣則病從藥増醫者不審誤人多矣面色反有熱色者未欲解也面有熱色則餘邪尚鬱以其不得小汗出身必痒宜服㣲邪已在皮膚中欲自出不得故身痒以此湯取其小汗足矣陽明篇云身痒如蟲行皮中狀者此以乆虚故也按此方分兩甚輕計共約六兩合今之秤僅一兩三四錢分三服祇服四錢零乃治邪退後至輕之劑猶勿藥也桂枝二麻黄一湯十二桂枝一兩十七銖去皮芍藥一兩六銖甘草一兩二銖杏仁十六枚去皮尖麻黄十六銖去節生薑一兩六銖大棗五枚右七味以水五升先煮麻黄一二沸去上沫内諸藥煮取二升去滓温服一升日再服一本云桂枝湯二升麻黄湯一升合為三升分再服服桂枝湯大汗出脈洪大者汗雖出而邪未盡與桂枝湯如前法此所謂邪不盡行復如法者也若形如瘧日再發者汗出必解桂枝二麻黄一湯主之此與桂枝麻黄各半湯意畧同但此因大汗出之後故桂枝畧重而麻黄畧輕桂枝二越婢一湯十三桂枝湯加麻黄石羔二味桂枝去皮芍藥甘草麻黄去節各十八銖大棗四枚生薑一兩二銖石羔二十四銖碎綿裹右七味以水五升煮麻黄一二沸去上沫内諸藥煮取二升去渣温服一升附越婢方麻黄六兩生薑三兩甘草二兩枚石羔半觔大棗十五太陽病發熱惡寒熱多寒少脈㣲弱者此無陽也不可更汗此無陽與亡陽不同并與他處之陽虚亦别蓋其人本非壯盛而邪氣亦輕故身有寒熱而脈㣲弱若發其汗必至有又手冒心臍下悸等症故以此湯清疎營衛令得似汗而解况熱多寒少熱在氣分尤與石羔為宜古聖用藥之審如此凖按以上三方所謂一二各半之説照方計算並不對未知何説或云將本方各煎或一分或二分相和服此亦一法但方中又各藥注明分兩則何也存考桂枝去桂加茯苓白术湯十四芍藥三兩甘草二兩炙生薑茯苓白术各三兩大棗十二枚右六味以水八升煮取三升去滓温服一升小便利則愈此方專於利小便服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿㣲痛小便不利者此湯主之頭痛發熱桂枝症仍在也以其無汗則不宜更用桂枝心下滿則用白术小便不利則用茯苓此症乃亡津液而有停飲者也凡方中有加減法皆佐使之藥若去其君藥則另立方名今去桂枝而仍以桂枝為名所不可解殆以此方雖去桂枝而意仍不離乎桂枝也桂枝去芍藥加蜀漆龍骨牡蠣救逆湯十五桂枝湯原方去芍藥加蜀漆三兩洗去腥牡蠣五兩熬龍骨四兩右七味以水一斗二升先煮蜀漆减二升内諸藥煮取三升去滓温服一升傷寒脈浮醫以火迫刼之亡陽必驚狂以火刼其胸中之陽起卧不安者此湯主之此與少隂汗出之亡陽逈别蓋少隂之亡陽乃亡隂中之陽故用四逆輩回其陽於腎中今乃以火逼汗亡其陽中之陽故用安神之品鎮其陽於心中各有至理不可易也去芍藥因陽虚不復助隂也蜀漆去心腹邪積龍骨牡蠣治驚癎熱氣桂枝甘草龍骨牡蠣湯十六桂枝一兩去皮甘草二兩炙牡蠣二兩熬龍骨二兩右四味以水五升煮取二升半去渣温服八合日三服脈浮宜以汗解此治脈浮之總訣用火灸之誤治邪無從出因火而盛火反入内病從腰以下必重而痺名火逆也火氣在上則隂氣獨治於下故重而痺火逆下之又誤治因燒針煩燥者更誤治下之虚其隂燒針又益其陽則胸中益煩燥不寧矣桂枝甘草龍骨牡蠣湯主之鎮其隂氣散其火邪上下同治前方驚狂治重在心故用蜀漆此無驚狂象故蜀漆不用其症藥大段相同桂枝加葛根湯十七此湯成無已本有麻黄非有麻黄則為葛根湯矣桂枝湯原方加葛根四兩桂枝芍藥各减一兩餘同右六味以水一斗先煮葛根减二升去上沫内諸藥煮取三升去渣温服一升覆取㣲似汗不須啜粥太陽病項背強几几反汗出惡風者几几伸頸之象邪氣漸深故加葛根桂枝加葛根湯主之桂枝加芍藥湯十八桂枝湯原方芍藥加一倍右五味以水七升煮取三升温服一升日三服桂枝加大黄湯十九此二方俱治太隂症而法不離乎桂枝桂枝湯原方加大黄一兩芍藥一倍右六味以水七升煮取三升去滓温服一升日三服本太陽病醫反下之誤治因而腹滿時痛屬太隂也引邪入於太隂故所現皆太隂之症桂枝加芍藥湯主之雖見太隂症而太陽之症尚未罷故仍用桂枝湯只加芍藥一倍以斂太隂之症大實痛者此句承上文腹滿時痛言腹滿時痛不過傷太隂之氣大實痛則邪氣結於太隂矣桂枝加大黄湯主之此因誤下而見太隂之症大實痛則反成太隂之實邪仍用大黄引之即從太隂出不因誤下而禁下見症施治無不盡然江按活人書云桂枝湯自西北人四時行之無不應驗淮間惟冬及春可行之春末及夏至以前桂枝症可加黄芩一分謂之陽旦湯夏至後可加知母半兩石羔一兩或加升麻一分若病人素虚寒者不必加減麻黄湯類二麻黄湯一麻黄三兩去節桂枝二兩去皮甘草一兩炙杏仁七十個去皮尖右四味以水九升先煮麻黄減二升此須多煮取其力專不僅為去上沫止煮一二沸矣去上沫内諸藥煮取二升半去滓温服八合覆取㣲似汗不須啜粥以其易發汗也餘如桂枝將息法活人書云夏至後用麻黄湯量加知母石羔黄芩蓋麻黄性熱恐有發黄斑出之意太陽病頭痛發熱身疼腰痛骨節疼痛此痛處比桂枝症尤多而重因榮衛俱傷故也惡風無汗而喘者此二症乃肺氣不舒之故麻黄治無汗杏仁治喘桂枝甘草治太陽諸症無一味不𦂳切所以謂之經方太陽與陽明合病陽明之病象甚多如身熱不惡寒口苦鼻乾之類但見一二症即是不必全具也太陽病即上文所指者喘而胸滿者不可下病俱在上焦宜麻黄湯主之喘而胸滿此麻黄症之太陽合陽明也太陽病十日以去過經脈浮細邪已退而嗜卧者正漸復外已解也設胸滿脇痛者與小柴胡湯胸滿脇痛病延日乆邪留少陽故與此湯脈但浮者與麻黄湯若果邪在少陽脈必帶弦今但浮則尚在太陽矣故仍用麻黄湯此亦從脈不從症之法太陽病脈浮𦂳無汗發熱身疼痛此乃太陽傷寒的症經云諸𦂳為寒八九日不解表証仍在表証即上文數端此當發其汗宜麻黄湯服藥已㣲除其人發煩目瞑陽鬱而不能外達劇者必衂衂乃解熱甚動血血由肺之清道而出與汗從皮毛而洩同故熱邪亦解俗語所云紅汗也經云陽明病口燥但欲潄水不欲嚥者此必衂所以然者陽氣重故也風鬱固為熱寒鬱亦為熱内經云熱病者皆傷寒之類也麻黄湯主之此言未衂之前可用麻黄非衂後更用麻黄也脈浮者病在表可發汗宜麻黄湯此脈浮必帶𦂳脈浮而數者可發汗宜麻黄湯數為陽氣欲出傷寒脈浮𦂳不發汗失治因致衂者麻黄湯主之前段衂後而解則不必復用麻黄衂後尚未解則仍用此湯陽明病脈浮無汗而喘者陽明本脈大自汗今乃脈浮無汗而喘則為麻黄湯症矣發汗則愈宜麻黄湯麻黄杏仁甘草石羔湯二此即越婢湯加杏仁也麻黄四兩去節杏仁五十個去皮尖甘草二兩炙石膏半斤碎綿褁右四味以水七升先煮麻黄減二升去上沫内諸藥煮取二升去滓温服一升發汗後不可更行桂枝湯既汗不可再汗津液不得重傷汗出而喘尚有留邪在肺故汗出而喘無大熱者邪已輕也可與此湯汗出故用石膏喘故用麻杏發汗後飲水多者必喘以水灌之亦喘此二句明致喘之所由蓋喘未必皆由於水而飲水則無有不喘者戒之下後不可更行桂枝湯既下不可復汗津液不得兩傷若汗出而喘無大熱者可與此湯大青龍湯三此合麻黄桂枝越婢三方為一方而無芍藥麻黄六兩去節桂枝二兩去皮甘草二兩炙杏仁四十枚去皮尖生薑三兩切大棗十二枚石膏碎如雞子大一塊右七味以水九升先煮麻黄减二升去上沫内諸藥煮取三升去滓温服一升取㣲似汗汗出多者温粉撲之此外治之法論中無温粉方明理論載白术藁本川芎白芷各等分入米粉和匀撲之無藁本亦得後人用牡蠣麻黄根鉛粉龍骨亦可一服汗者停後服汗多亡陽遂虚惡風煩燥不得眠也太陽中風脈浮𦂳𦂳為隂脈故汗不易出發熱惡寒非惡風身疼痛不汗出而煩燥者邪深熱鬱大青龍湯主之若脈㣲弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也惡風乃桂枝症誤服此則汗不止而有亡陽之象矣立此方即垂此戒聖人之意深矣按此方合麻桂而用石羔何以發汗如是之烈蓋麻黄湯麻黄用二兩而此用六兩越婢湯石羔用半斤而此用鷄子大一塊一劑之藥除大棗約共十六兩以今稱計之亦重三兩有餘則發汗之重劑矣雖少加石羔終不足以相制也少隂篇云脈隂陽俱𦂳反汗出者亡陽也傷寒脈浮緩身不疼但重乍有輕時無少隂症者大青龍湯主之脈不沉𦂳身有輕時為無少隂外症不厥利吐逆為無少隂裡症此邪氣俱在外也故以大青龍發其汗乍按此條必有誤脈浮緩邪輕易散身不疼外邪已退有輕時病未入隂又别無少隂等症此病之最輕者何必投以青龍險峻之劑此必另有主方而誤以大青龍當之者也小青龍湯四麻黄去節芍藥細辛亁薑甘草桂枝去皮各三兩五味子半斤半夏半斤湯洗右八味以水一斗先煮麻黄減二升去上沫内諸藥煮取三升去滓温服一升若㣲利者去麻黄加蕘花如鷄子大熬令赤色利屬下焦隂分不可更發其陽蕘花明理論作芫花恐誤本草蕘花芫花花葉相近而蕘花不常用當時已不可得故改用芫花以其皆有去水之功也若渇者去半夏加括婁根三兩本草括婁根主消渇若噎者噎古作䭇論云寒氣相搏則為腸鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相搏其人即䭇者按内經無噎字疑即呃逆之輕去麻黄加附子一枚炮本草附子温中若小便不利少腹滿去麻黄加茯苓四兩小便不利而少腹滿則水不在上而在下矣故用茯苓若喘者去麻黄加杏仁半升去皮尖杏仁見前為按此方專治水氣蓋汗為水類肺水源邪汗未盡必停於肺胃之間病屬有形非一味發散所能除此方無㣲不到真神劑也傷寒表不解發汗未透心下有水氣即未出之汗乾嘔發熱而欬或渇或痢或噎或小便不利少腹滿或喘者小青龍湯主之以上皆水停心下現症其毎症治法皆在加減中傷寒心下有水氣欬而㣲喘發熱不渇凡水停心下者喘而不渇服湯已即小青龍湯也渇者此寒氣欲解也寒飲欲去小青龍湯主之此倒筆法即指服湯已三字非謂欲解之後更服小青龍湯也麻黄附子細辛湯五麻黄去節二兩細辛二兩附子一枚炮右三味先煮麻黄减二升去上沫内諸藥煮取三升去滓温服一升日三服少隂病始得之反發熱脈沉者此湯主之少隂病三字所該者廣必從少隂諸現症細細詳審然後反發熱知為少隂之發熱否則何以知其非太陽陽明之發熱耶又必候其脈象之沉然後益知其為少隂無疑也凡審症皆當如此附子細辛為少隂温經之藥夫人知之用麻黄者以其發熱則邪猶連太陽未盡入隂猶可引之外逹不用桂枝而用麻黄者蓋桂枝表裏通用亦能温裡故隂經諸藥皆用之麻黄則專於發表今欲散少隂始入之邪非麻黄不可况已有附子足以温少隂之經矣麻黄附子甘草湯六麻黄去節二兩甘草二兩炙附子一枚炮右三味以水七升先煮麻黄一兩沸此當少煮去上沫内諸藥煮取三升去渣温服一升日三服少隂病得之二三日麻黄附子甘草湯㣲發汗以二三日無裡症故㣲發汗也三隂經惟少隂與太陽為表裏而位最近故猶有汗解之理况二三日而無裡症則其邪未深入此方較麻黄附子細辛少輕以其無裏症也葛根湯類三葛根湯一此即桂枝湯加麻黄三兩葛根四兩葛根四兩麻黄三兩去節芍藥二兩生薑三兩切甘草二兩炙桂枝二兩去皮大棗十二枚右七味以水一斗先煮麻黄葛根二味主藥先煮減二升去上沫内諸藥煮取三升去滓温服一升覆取㣲似汗不須啜粥已能發汗矣餘如桂枝法將息及禁忌太陽病項背強几几無汗惡風葛根湯主之前桂枝加葛根湯一條其現症亦同但彼云反汗出故無麻黄此云無汗故加麻黄也陽明症汗出而惡熱今無汗而惡風則未全入陽明故曰太陽病陽按葛根本草治身大熱大熱乃陽明之症也以太將入陽明之經故加此藥太陽與陽明合病者必自下利葛根湯主之合病全在下利一症上審出蓋風邪入胃則下利矣葛根黄芩黄連湯二葛根半斤甘草二兩炙黄芩三兩黄連三兩右四味以水八升先煮葛根减二升内諸藥煮取二升去渣分温再服太陽病桂枝症桂枝症即太陽傷風之正病也醫反下之大誤利遂不止邪下䧟則利無止時脈促者表未解也促有數意邪猶在外尚未䧟入三隂而見沉㣲等象故不用理中等法喘而汗出者此湯主之因表未解故用葛根因喘汗而利故用芩連之苦以洩之堅之藥芩連甘草為治痢之主葛根加半夏湯三葛根湯原方加半夏半升洗煎服法同太陽與陽明合病不下利前條因下利而知太陽陽明合病今既不下利則合病何從而知必須從兩經本症一一對勘即不下利而亦可定為合病矣但嘔者葛根加半夏湯主之前條太陽誤下而成利則用芩連治利因其本屬桂枝症而脈促故止加葛根一味以解陽明初入之邪此條乃太陽陽明合病故用葛根湯全方因其但嘔加半夏一味以止嘔隨病立方各有法度柴胡湯類四小柴胡湯一柴胡半斤黄芩人參甘草炙生薑各三兩半夏半斤大棗十二枚右七味以水一斗二升煮取六升去渣再煎此又一法取三升温服一升日三服此湯除大棗共二十八兩較今秤亦五兩六錢零雖分三服已為重劑蓋少陽介於兩陽之間須兼顧三經故藥不宜輕去滓再煎者此方乃和解之劑再煎則藥性和合能使經氣相融不復往來出入古聖不但用藥之妙其煎法俱有精義若胸中煩而不嘔者去半夏人參不嘔不必用半夏煩不可用人參加括婁實一枚括婁實除胸痺此小䧟胸之法也若渇者去半夏半夏能滌痰濕即能耗津液加人參生津液合前成四兩半括婁根四兩治消渇若腹中痛者去黄芩苦寒加芍藥三兩除腹痛若脇下痞鞭去大棗以其能補脾胃加牡蠣四兩别録云治脇下痞熱若心下悸小便不利者去黄芩加茯苓四兩利小便若不渇外有微熱者去人參不渇則津液自足加桂枝三兩㣲熱則邪留太陽温覆取㣲似汗愈若欬者去人參大棗二味與𠻳非宜生薑加乾薑故去生薑加五味子半升乾薑二兩古方治𠻳五味乾薑必同用一以散寒邪一以斂正氣從無單用五味治𠻳之法後人不知用必有害况傷熱勞怯火嗆與此處寒飲犯肺之症又大不同乃獨用五味收斂風火痰涎深入肺藏永難救療矣又按小柴胡與桂枝二方用處極多能深求其義則法變化心生矣論中凡可通用之方必有加減傷寒五六日正當傳少陽之期中風往來寒熱太陽之寒熱寒時亦熱熱時亦寒往来者寒已而熱熱已而寒也胸脇苦滿胸脇為少陽之位黙黙不欲飲食木邪干土心煩喜嘔木氣上逆或胸中煩而不嘔或渇少陽火邪或腹中痛木尅土或脇下痞鞭木氣填鬱或心下悸有痰飲小便不利或不渇有蓄飲身有㣲熱太陽未盡或欬者肺有留飲此湯主之少陽所現之症甚多柴胡湯所治之症亦不一加減法具載方末血弱氣盡腠理開邪氣因入與正氣相搏結於脇下正邪分爭往來寒熱休作有時黙黙不欲飲食藏府相連其痛必下邪髙痛下故使嘔也此條申明所以往來寒熱及不欲食下痛上嘔之故皆因正衰邪入藏府相牽所致則立方之意可推而知矣小柴胡湯主之服柴胡湯已渇者屬陽明也以法治之此必先見少陽之症故用柴胡湯服後而渇則轉屬陽明矣傷寒四五日身熱惡風頸項強此是太陽所同脇下滿此則少陽所獨手足温而渇者前條之渇者屬陽明此因脇下滿則雖似陽明不作陽明治矣小柴胡湯主之傷寒陽脈濇隂脈弦法當腹中急痛先與小建中湯不差者與小柴胡湯主之詳見桂枝類中傷寒中風有柴胡症但見一証便是不必悉具少陽與太陽陽明相為出入一証可據雖有他証可兼治矣凡柴胡湯病証而下之誤治若柴胡証不罷者復與柴胡湯凡誤治而本証未罷仍用本証之方他經盡同不獨柴胡証也必蒸蒸而振却發熱汗出而解邪已䧟下故必振動而後能達於外辨脈法篇云戰而汗出者其人本虚是以發戰發熱汗出邪仍從少陽而出傷寒十三日不解過經二候胸脇滿而嘔此少陽的症日晡所發潮熱此似陽明已而㣲利又現裡症藥亂則症亦亂此本柴胡症下之而不得利今反利者知醫以丸藥下之非其治也以湯劑利之不應復以丸藥利之是謂重傷潮熱者實也先宜小柴胡湯以解外雖潮熱本屬少陽之邪故仍以柴胡解外後以柴胡加芒硝主之解在後加芒硝湯下傷寒五六日頭汗出㣲惡寒手足冷心下滿口不欲食大便鞭脈細者此為陽㣲結陽氣不能隨經而散故鬱結不舒非藥誤即遷延所致亦壊症之輕者必有表復有裡也以上諸症有表有裡柴胡湯兼治表裡脈沉亦在裡也脈細者必沉汗出為陽㣲以汗為徴假令純隂結不得復有外証隂則無汗此為半在裡半在表也脈沉為裡汗出為表脈雖沉𦂳細即有𦂳象不得為少隂病所以然者隂不得有汗此為要訣今頭汗出故知非少隂也可與小柴胡湯設不了了者得屎而解得湯而不了了者以有裡症故大便鞭必通其大便而後其病可愈其通便之法即加芒硝及大柴胡等方是也陽明病發潮熱大便溏小便自可胸脇滿而不去者小柴胡湯主之陽明潮熱乃當下之症因大便小便自可則裡症未具又胸脇嘗滿則邪留少陽無疑用此湯和解之陽明病脇下鞭滿少陽症不大便可下而嘔亦少陽症舌上白胎者邪未結於陽明故舌胎白雖不大便不可下此要訣也可與小柴胡湯上焦得通津液得下胃氣因和身濈然汗出而解也此四句申明小柴胡之功效如此所以諸症得之皆愈也陽按少陽之外為太陽裡為陽明而少陽居其間故少之症有兼太陽者有兼陽明者内中見少陽一症即可用小柴胡湯必能兩顧得效仲景所以獨重此方也陽明中風脈弦浮大弦屬少陽浮大屬陽明而短氣腹都滿脇下及心痛此少陽症久按之氣不通鼻乾不得汗嗜卧此症又似少隂一身面目悉黄小便難此二症又似太隂有潮熱此似陽明耳前後腫刺之小差外不解病過十日脈續浮者與小柴胡湯脈浮雖有裏症邪仍欲外出脈但浮無餘症者與麻黄湯但浮無餘症則裏症全無必從汗解故用麻黄湯則此二條明陽明中風之症有裏邪用小柴胡無裏邪用麻黄總以脈症為慿無一定法也若不尿膀胱氣絶腹滿加噦者不治論中陽明篇云陽明病不能食攻其熱必噦所以然者胃中虚冷故也虚冷二字尤明蓋陽㣲欲盡也又云大吐大下汗出怫鬱復與之水以發其汗因得噦靈樞云真邪相攻氣并相逆故為噦即呃逆也素問云病深者其聲噦乃肺胃之氣隔絶所致兼以腹滿故不治本太陽病不解轉入少陽者此為傳經之邪也脇下鞭滿乾嘔不能食往來寒熱以上皆少陽本症尚未吐下脈沉𦂳者未吐下不經誤治也少陽已漸入裡故不浮而沉𦂳則弦之甚者亦少陽本脈與小柴胡湯嘔而發熱者小柴胡湯主之但發熱而非往來寒熱則與太陽陽明同惟嘔則少陽所獨故亦用此湯太陽病十日以去脈浮細而嗜卧者外已解也設胸滿脇痛者與小柴胡湯脈但浮者與麻黄湯解見麻黄湯傷寒差以後更發熱者小柴胡主之此復症也非勞復非女勞復乃正氣不充餘邪未盡留在半表半裏之間故亦用小柴胡復病治法明著於此後世議論不一皆非正治脈浮者以汗解之脈沉實者以下解之復症之中更當考此二脈如果脈見浮象則邪留太陽當用汗法如脈見沉實則裏邪未盡當用下法但汗下不著方名者因汗下之法不一醫者於麻黄桂枝及承氣大柴胡等方對症之輕重擇而用之則無不中病矣婦人中風七八日續得寒熱發作有時此即下文所謂如瘧也經水適斷者此為熱入血室其血必結血因熱結而成瘀矣故使如瘧狀發作有時小柴胡湯主之即以治瘧之法治之又云婦人中風發熱惡寒經水適來彼云斷此云來得之七八日熱除而脈遲身凉外邪内伏胸脇下滿如結胸狀讝語者此為熱入血室也血室為中焦營氣之所聚肝藏血心主血營血結滯則肝氣與心經之氣亦凝故脇滿而神昬讝語當刺期門隨其實而瀉之期門在乳下第二肋端去乳頭約四寸肝募也厥隂隂維之㑹刺入四分血結則為有形之症湯劑一時難效刺期門以瀉厥隂有餘之熱則尤親切而易散又云婦人傷寒發熱經水適來晝日明了暮則讝語如見鬼狀者此為熱入血室晝清而夜昬者血室屬隂病在隂經也無犯胃氣及上二焦必自愈此為中焦營氣之疾汗下二法皆非所宜小柴胡湯刺期門則其治也最按熱入血室之狀此二條為最詳婦人傷寒此症多前條症稍輕後二條症尤重男子亦有之大柴胡湯二小柴胡去人參甘草加枳實芍藥大黄乃少陽陽明合治之方也柴胡半斤半夏半斤黄芩三兩芍藥三兩生薑五兩枳實四枚大棗十二枚右七味以水一斗二升煮取六升再煎取三升温服一升日三服此方本有大黄二兩王叔和云若不加大黄恐不為大柴胡也太陽病過經十餘日反二三下之一誤再誤後二三日柴胡症仍在者如寒熱嘔逆之類先與小柴胡湯嘔不止心下急鬰鬱㣲煩者猶有裏症為未解也與大柴胡湯下之則愈前雖已下非下法也以大柴胡兩解之傷寒十餘日熱結在裏此大黄之對症復往來寒熱此柴胡之對症與大柴胡湯傷寒發熱汗出不解當用柴胡心中痞鞭嘔吐而下痢者邪内䧟故用枳實半夏大黄此湯主之傷寒後後者過經之後諸症漸輕而未全愈也脈沉沉者内實也沉為在裏下解之宜大柴胡湯柴胡桂枝湯三此小柴胡與桂枝湯併為一方乃少陽太陽合病之方柴胡四兩黄芩人參桂枝芍藥生薑各一兩半半夏二合半甘草一兩炙大棗六枚右九味水七升煮取三升去渣温服一升傷寒六七日發熱㣲惡寒支節疼煩以上太陽症㣲嘔心下支結以上少陽症外症未去者太陽症為外症柴胡桂枝湯主之發汗多亡陽譫語者此亡陽之輕者也不可下勿誤以為有燥屎之譫語故以為戒與柴胡桂枝湯和其營衛以通津液後自愈桂枝湯和營衛柴胡湯通津液深著二湯合用之功效而陽亡可復矣柴胡加龍骨牡蠣湯四柴胡龍骨生薑人參茯苓鉛丹黄芩牡蠣桂枝各一兩半半夏二合大棗六枚大黄二兩右十二味以水八升煮取四升内大黄更煮一二沸大黄只煮一二沸取其生而流利也去滓温服一升傷寒八九日下之即䧟入裡胸滿柴胡黄芩煩驚龍骨鉛丹牡蠣小便不利茯苓讝語大黄一身盡重不能轉側者茯苓此湯主之此乃正氣虚耗邪已入裏而復外擾三陽故現症錯雜藥亦隨症施治真神化無方者也按此方能下肝胆之驚痰以之治癲癎必效柴胡桂枝乾薑湯五柴胡半斤桂枝三兩黄芩三兩亁薑牡蠣熬甘草各二兩括婁根四兩右七味以水一斗二升煮取六升去渣再煎取三升温服一升日三服初服㣲煩復服汗出便愈邪氣已深一時不能即出如蒸蒸而振發熱汗出而解之類傷寒五六日已發汗而復下之一誤再誤胸脇滿用牡蠣㣲結小便不利渇以上皆少陽症渇故用括婁而不嘔故去半夏生薑但頭汗出陽氣上越用牡蠣往來寒熱用柴芩心下煩者黄芩牡蠣此為未解也柴胡桂枝乾薑湯主之柴胡加芒硝湯六柴胡湯原方加芒硝分兩各不同柴胡二兩十六銖黄芩甘草炙人參生薑各一兩半夏二十銖大棗四枚芒硝二兩右八味以水四升煮取二升去渣内芒硝更煮㣲沸分温再服不解更作不解不大便也則此藥劑之最輕者以今秤計之約二兩分二服一服止一兩耳按大柴胡湯加大黄枳實乃合用小承氣也此加芒硝乃合用調胃承氣也皆少陽陽明同治之方傷寒十三日不解胸脇滿而嘔日晡所發潮熱已而㣲利此本柴胡証下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之本草芒硝治六府積聚因其利而復下之所謂通因通用之法也潮熱而利則邪不停結故較之大柴胡症用藥稍輕梔子湯類五梔子䜴湯一梔子十四枚香豉四合綿裹右二味以水四升先煮梔子得二升半内豉煮取升半去滓分為二服温進一服得吐止後服此劑分兩最小凡治上焦之藥皆然發汗吐下後諸法俱用未必皆誤而正氣已傷矣虚煩不得眠虚為正氣虚煩為邪氣擾發汗吐下實邪雖去而其餘邪因正氣不充留於上焦故陽氣擾動而不得眠也若劇者必反覆顛倒心中懊憹反覆顛倒身不得寕也心中懊憹心不得安也梔子豉湯吐之此非汗下之所能除者吐之而痰涎結氣無不出矣按汗吐下之後而邪未盡則不在經而在肺胃之間為有形之物故必吐而出之反覆顛倒心中懊憹摩寫病狀何等詳切凡醫者之於病人必事事體貼如若身受之而後用藥無誤發汗若下之而煩熱胸中窒者煩熱且窒較前虚煩等象為稍實梔子豉湯主之傷寒五六日大下之後誤治身熱不去心中結痛者未欲解也外内之邪俱未解結痛更甚於窒矣梔子豉湯主之按胸中窒結痛何以不用小䧟胸蓋小䧟胸症乃心下痛胸中在心之上故不得用陷胸何以不用瀉心諸法蓋㵼心症乃心下痞痞為無形痛為有象故不得用瀉心古人治病非但内外不失厘毫即上下亦不踰分寸也陽明病脈浮而𦂳咽燥口苦胸滿而喘發熱汗出不惡寒反惡熱身重以上皆陽明本症非因誤治而得者若發汗則躁心憒憒反讝語汗多陽虚若加燒針必怵􅅥煩燥不得眠即前以火逼汗亡陽驚狂之意若下之則胃中空虚客氣動膈心中懊憹以前因用三法未必合度故病不解各有現症如此舌上胎者此句乃要訣舌上有白胎則胸中有物而可用吐法否則邪尚未結恐無物可吐也梔子豉湯主之陽明病下之其外有熱表邪未盡手足温不結胸無實邪心中懊憹饑不能食痰涎停結但頭汗出陽邪在上欲洩不洩梔子豉湯主之下利後更煩按之心下濡者濡者濕滯之象非窒非痛也為虚煩也宜梔子豉湯梔子甘草䜴湯二梔子湯原方加甘草二兩炙右三味以水四升先煮梔子甘草取二升半内䜴煮取升半分二服温進一服得吐便止梔子生薑豉湯三梔子湯原方加生薑五兩先煮梔子生薑餘俱如前法得吐止後服凡用梔子湯病人舊㣲溏者不可與服之此服梔子湯之戒按梔子清越上焦之火與腸胃亦無大害㣲溏者即不可服未知何義想因大腸之氣滑脱者肺氣不宜更洩也若少氣者梔子甘草豉湯主之甘草能補中氣若嘔者梔子生薑豉湯主之此二條言凡遇當用梔子湯之病見此二症則加此二味也按無物為嘔有物為吐欲止其嘔反令其吐吐之而嘔反止真匪夷所思也梔子乾薑湯四梔子十四枚乾薑二兩右二味以水三升半煮取一升半去滓分二服温進一服得吐止後服傷寒醫以丸藥大下之下未必誤以丸藥大下則誤矣身熱不去外有㣲邪㣲煩下後而煩即虚煩也此湯主之下後故用乾薑梔子厚朴枳實湯五梔子十四枚厚朴四兩薑炙枳實四枚水浸去穰炒煮服法同前傷寒下後心煩即㣲煩腹滿卧起不安者煩而加之腹滿則卧起俱不寧矣厚朴枳實以治腹滿也梔子厚朴湯主之梔子檗皮湯六梔子十五枚甘草一兩黄檗二兩右三味以水四升煮取升半去滓分温再服傷寒身黄發熱者梔子檗皮湯主之本草檗皮散藏府結熱黄疸枳實梔子䜴湯七枳實三枚梔子十四枚豉一升右三味以清漿水七升空煮又一煮法漿水即淘米之泔水久貯味酸為佳取四升内枳實梔子煮取二升下䜴更煮五六沸去渣分温再服覆令㣲似汗此不取吐而取汗大病差後勞復者勞復乃病後之餘症不在吐法故取㣲汗枳實梔子湯主之勞復因病後氣虚邪氣又結於上焦其症不一故不著其病形惟散其上焦之邪足矣後人以峻補之劑治勞復則病變百出矣若有宿食者加大黄如博棋子大五六枚此指勞復之有宿食者治食復之法亦在其中矣方可吐篇云宿食在上脘當吐之按梔子湯加減七既不注定何經亦不專治何誤總由汗吐下之後正氣已虚尚有痰涎滯氣凝結上焦非汗下之所能除經所云在上者因而越之則不動經氣而正不重傷此為最便乃不易之法也古方梔子皆生用故入口即吐後人作湯以梔子炒黒不復作吐全失用梔子之意然服之於虚煩症亦有騐想其清肺除煩之性故在也終當從古法生用為妙傷寒類方卷上
